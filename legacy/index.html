                  <span style={{fontSize:12,color:T.text,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.label}</span>
                </div>
                <span style={{fontSize:10,color:T.muted,whiteSpace:'nowrap'}}>{d.count}× · {d.km}km</span>
              </div>
              <div style={{height:4,borderRadius:2,background:T.bg,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(d.count/maxCount)*100}%`,
                  background: i===0?`linear-gradient(to right,${T.teal},#0e9e97)`:`${T.muted}40`,
                  borderRadius:2,transition:'width .6s ease'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Role split */}
      <div style={{background:T.surface2,borderRadius:16,padding:'14px',border:`1px solid ${T.border}`}}>
        <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:10}}>
          {t('dashboard.roleSplit')}
        </div>
        <div style={{display:'flex',height:32,borderRadius:10,overflow:'hidden',
          border:`1px solid ${T.border}`}}>
          <div style={{width:`${driverPct}%`,
            background:`linear-gradient(135deg,${T.amber},${T.amber}aa)`,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,fontWeight:600,color:'white',minWidth:60}}>
            🚗 {driverPct}%
          </div>
          <div style={{flex:1,
            background:`linear-gradient(135deg,${T.teal},#0e9e97)`,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,fontWeight:600,color:'white'}}>
            🧑‍✈️ {100-driverPct}%
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11,color:T.muted}}>
          <span>{t('dashboard.asDriver',{n:driverTrips})}</span>
          <span>{t('dashboard.asPassenger',{n:passTrips})}</span>
        </div>
      </div>
    </div>
  );
}

// ── BOTTOM NAV BAR ─────────────────────────────────────────────
function BottomNavBar({ onRouteSheet, mode, routeActive, userLoc, onMapTask, hidden, onContactCall, onContactSms }) {
  // 'idle' | 'opening' | 'open' | 'closing'
  const [panelState, setPanelState] = useState('idle');
  const [active, setActive] = useState(null);
  const [nextActive, setNextActive] = useState(null);
  const [selectedContact, setSelectedContact] = useState(null);
  const timerRef = useRef(null);

  const clearContactFocus = () => {
    setSelectedContact(null);
    onMapTask && onMapTask({ type:'contactClear' });
  };
  const selectContact = (c) => {
    setSelectedContact(c);
    onMapTask && onMapTask({ type:'contactFocus', contact:c });
  };

  const OPEN_DUR = 380;
  const CLOSE_DUR = 280;

  const openPanel = (id) => {
    clearTimeout(timerRef.current);
    if (selectedContact) clearContactFocus();
    if (panelState === 'open' || panelState === 'opening') {
      if (active === id) { closePanel(); return; }
      // swap: close then open new
      setPanelState('closing');
      setNextActive(id);
      timerRef.current = setTimeout(() => {
        setActive(id);
        setNextActive(null);
        setPanelState('opening');
        timerRef.current = setTimeout(() => setPanelState('open'), OPEN_DUR);
      }, CLOSE_DUR);
      return;
    }
    setActive(id);
    setPanelState('opening');
    timerRef.current = setTimeout(() => setPanelState('open'), OPEN_DUR);
  };

  const closePanel = () => {
    clearTimeout(timerRef.current);
    if (selectedContact) clearContactFocus();
    setPanelState('closing');
    timerRef.current = setTimeout(() => {
      setActive(null);
      setPanelState('idle');
    }, CLOSE_DUR);
  };

  const handleCenter = () => {
    if (routeActive) return; // faol marshrut bor — yangi marshrut yaratib bo'lmaydi
    if (panelState !== 'idle') { closePanel(); }
    onRouteSheet();
  };

  const isOpen = panelState === 'open' || panelState === 'opening';
  const isVisible = panelState !== 'idle';
  // navbar hides when panel is open/opening/closing
  const navHidden = panelState !== 'idle';

  const TABS = [
    {
      id:'saved', label:t('nav.saved'),
      icon: (c) => <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M5 3h10a1 1 0 011 1v13l-6-3-6 3V4a1 1 0 011-1z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/>
      </svg>,
    },
    {
      id:'history', label:t('nav.history'),
      icon: (c) => <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="7" stroke={c} strokeWidth="1.6"/>
        <path d="M10 6v4l3 2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/>
      </svg>,
    },
    { id:'center', label:t('nav.new'), icon: null },
    {
      id:'schedule', label:t('nav.schedule'),
      icon: (c) => <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="4" width="14" height="13" rx="2" stroke={c} strokeWidth="1.6"/>
        <path d="M7 2v3M13 2v3M3 9h14" stroke={c} strokeWidth="1.6" strokeLinecap="round"/>
      </svg>,
    },
    {
      id:'contacts', label:t('nav.contacts'),
      icon: (c) => <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="7.5" cy="7" r="3" stroke={c} strokeWidth="1.6"/>
        <path d="M2.5 16.5c0-2.8 2.2-4.6 5-4.6s5 1.8 5 4.6" stroke={c} strokeWidth="1.6" strokeLinecap="round"/>
        <path d="M13.4 5.3a2.6 2.6 0 010 5M14.6 16.5c0-2.4-1.3-4.1-3-4.5" stroke={c} strokeWidth="1.6" strokeLinecap="round"/>
      </svg>,
    },
  ];

  const panelTitles = {
    saved:t('nav.titleSaved'), history:t('nav.titleHistory'),
    schedule:t('nav.titleSchedule'), contacts:t('nav.titleContacts'),
  };
  const panelMap = {
    saved:<SavedPanel/>, history:<HistoryPanel/>,
    schedule:<SchedulePanel mode={mode} userLoc={userLoc} onMapTask={onMapTask}/>,
    contacts:<ContactsPanel onSelect={selectContact}/>,
  };

  return (
    <>
      <style>{`
        @keyframes nb-panel-in {
          0%   { opacity:0; transform:translateY(100%); }
          60%  { opacity:1; }
          100% { opacity:1; transform:translateY(0); }
        }
        @keyframes nb-panel-out {
          0%   { opacity:1; transform:translateY(0) scale(1); }
          100% { opacity:0; transform:translateY(60%) scale(0.98); }
        }
        @keyframes nb-bar-out {
          0%   { opacity:1; transform:translateY(0) scale(1); }
          100% { opacity:0; transform:translateY(28px) scale(0.96); }
        }
        @keyframes nb-bar-in {
          0%   { opacity:0; transform:translateY(20px) scale(0.96); }
          100% { opacity:1; transform:translateY(0) scale(1); }
        }
        @keyframes nb-fab-sink {
          0%   { transform:translateY(-14px) scale(1); }
          100% { transform:translateY(0) scale(0.88); }
        }
        @keyframes nb-fab-rise {
          0%   { transform:translateY(0) scale(0.88); }
          100% { transform:translateY(-14px) scale(1); }
        }
      `}</style>

      <div style={{
        position:'absolute', bottom:0, left:0, right:0,
        pointerEvents:'auto', zIndex:5,
        display: hidden ? 'none' : 'block',
      }}>

        {/* ── Full-width panel ── */}
        {isVisible && (selectedContact ? (
          <ContactMinimized contact={selectedContact} onBack={clearContactFocus}
            onCall={(c)=>onContactCall && onContactCall(c)}
            onSms={(c)=>onContactSms && onContactSms(c)}/>
        ) : (
          <div className="otw-sheet" style={{
            position:'absolute', bottom:0, left:0, right:0,
            maxHeight:'760px',
            background:T.glassSolid, backdropFilter:'blur(28px)',
            borderRadius:'24px 24px 0 0',
            border:`1px solid ${T.border}`,
            borderBottom:'none',
            overflow:'hidden',
            paddingBottom:'env(safe-area-inset-bottom,0px)',
            animation: panelState === 'closing'
              ? `nb-panel-out ${CLOSE_DUR}ms cubic-bezier(.4,0,.6,1) forwards`
              : `nb-panel-in ${OPEN_DUR}ms cubic-bezier(.22,1,.36,1) forwards`,
            display:'flex', flexDirection:'column',
          }}>
            {/* Panel header */}
            <div style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'20px 20px 14px',
              borderBottom:`1px solid ${T.border}`, flexShrink:0,
            }}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:4,height:20,borderRadius:2,background:T.teal}}/>
                <span style={{fontSize:16,fontWeight:600,color:T.text}}>
                  {active ? panelTitles[active] : ''}
                </span>
              </div>
              <button onClick={closePanel} style={{
                width:32, height:32, borderRadius:10,
                border:`1px solid ${T.border}`, background:T.hover,
                color:T.muted, cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center',
                transition:'background .15s ease',
              }}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M1 1l10 10M11 1L1 11" stroke={T.muted} strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </button>
            </div>
            {/* Panel content */}
            <div style={{flex:1, minHeight:0, overflowY:'auto', display:'flex', flexDirection:'column'}}>
              {active && panelMap[active]}
            </div>
            {/* Bottom safe area / tab strip inside panel */}
            <div style={{
              display:'flex', alignItems:'center',
              padding:'8px 16px 28px',
              borderTop:`1px solid ${T.border}`,
              gap:4, flexShrink:0,
            }}>
              {TABS.map(tab => {
                if (tab.id === 'center') {
                  return (
                    <div key="center" style={{flex:1,display:'flex',justifyContent:'center'}}>
                      <button onClick={handleCenter} disabled={routeActive} style={{
                        width:46, height:46, borderRadius:'50%',
                        background: routeActive
                          ? T.glassMid
                          : `linear-gradient(135deg,${T.teal},#0e9e97)`,
                        border:`2.5px solid ${T.glassSolid}`,
                        cursor: routeActive ? 'not-allowed' : 'pointer',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        boxShadow: routeActive ? 'none' : `0 0 16px ${T.tealGlow}, 0 4px 10px rgba(0,0,0,.4)`,
                        transition:'transform .2s ease',
                      }}>
                        {routeActive ? (
                          <svg width="17" height="17" viewBox="0 0 22 22" fill="none">
                            <rect x="5" y="10" width="12" height="9" rx="2" stroke={T.muted} strokeWidth="2"/>
                            <path d="M8 10 V7 a3 3 0 0 1 6 0 V10" stroke={T.muted} strokeWidth="2"/>
                          </svg>
                        ) : (
                          <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
                            <circle cx="11" cy="9" r="5" stroke="white" strokeWidth="2"/>
                            <path d="M11 15L11 20" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                            <path d="M7 20H15" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                          </svg>
                        )}
                      </button>
                    </div>
                  );
                }
                const isAct = active === tab.id;
                return (
                  <button key={tab.id} onClick={() => openPanel(tab.id)} style={{
                    flex:1, background:'transparent', border:'none', cursor:'pointer',
                    display:'flex', flexDirection:'column', alignItems:'center', gap:3,
                    padding:'6px 0', fontFamily:'DM Sans,sans-serif',
                    color: isAct ? T.teal : T.muted,
                    transition:'color .2s ease',
                  }}>
                    {tab.icon(isAct ? T.teal : T.muted)}
                    <span style={{fontSize:9,fontWeight:isAct?600:400,letterSpacing:.3}}>
                      {tab.label}
                    </span>
                    <div style={{
                      width: isAct ? 16 : 0, height:2, borderRadius:1,
                      background:T.teal, transition:'width .25s cubic-bezier(.34,1.3,.64,1)',
                    }}/>
                  </button>
                );
              })}
            </div>
          </div>
        ))}

        {/* ── Nav bar (hidden when panel open) ── */}
        <div className="otw-navbar" style={{
          margin:'0 16px 20px',
          background:T.glass, backdropFilter:'blur(20px)',
          borderRadius:24,
          border:`1px solid ${T.border}`,
          position:'relative',
          paddingBottom:4,
          animation: panelState === 'opening'
            ? `nb-bar-out ${CLOSE_DUR}ms cubic-bezier(.4,0,.6,1) forwards`
            : panelState === 'closing'
            ? `nb-bar-in ${OPEN_DUR}ms cubic-bezier(.22,1,.36,1) forwards`
            : 'none',
          opacity: (panelState === 'open') ? 0 : 1,
          visibility: (panelState === 'open') ? 'hidden' : 'visible',
          pointerEvents: navHidden ? 'none' : 'auto',
        }}>
          {/* SVG arc border */}
          <svg style={{position:'absolute',top:-1,left:0,width:'100%',
            overflow:'visible',pointerEvents:'none',zIndex:2}}
            height="36" viewBox="0 0 358 36" preserveAspectRatio="none">
            <defs>
              <linearGradient id="arcGrad2" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor={T.teal} stopOpacity="0.3"/>
                <stop offset="40%" stopColor={T.teal} stopOpacity="0.9"/>
                <stop offset="60%" stopColor={T.teal} stopOpacity="0.9"/>
                <stop offset="100%" stopColor={T.teal} stopOpacity="0.3"/>
              </linearGradient>
            </defs>
            <path d="M0,1 L132,1 Q179,-30 226,1 L358,1"
              stroke="url(#arcGrad2)" strokeWidth="1.5" fill="none"
              style={{filter:`drop-shadow(0 0 5px ${T.teal}88)`}}/>
          </svg>

          <div style={{display:'flex',alignItems:'flex-end',paddingTop:6}}>
            {TABS.map((tab) => {
              if (tab.id === 'center') {
                return (
                  <div key="center" style={{flex:1,display:'flex',justifyContent:'center',
                    alignItems:'flex-end',paddingBottom:4}}>
                    <button onClick={handleCenter} disabled={routeActive} style={{
                      width:56, height:56, borderRadius:'50%',
                      background: routeActive
                        ? T.glassMid
                        : `linear-gradient(135deg,${T.teal},#0e9e97)`,
                      border:`3px solid ${T.glass}`,
                      cursor: routeActive ? 'not-allowed' : 'pointer',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      boxShadow: routeActive ? 'none' : `0 0 24px ${T.tealGlow}, 0 4px 12px rgba(0,0,0,.5)`,
                      transform:'translateY(-14px)',
                      transition:'transform .3s cubic-bezier(.34,1.3,.64,1), width .3s, height .3s',
                      flexShrink:0, zIndex:3, position:'relative',
                    }}>
                      {routeActive ? (
                        <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
                          <rect x="5" y="10" width="12" height="9" rx="2" stroke={T.muted} strokeWidth="2"/>
                          <path d="M8 10 V7 a3 3 0 0 1 6 0 V10" stroke={T.muted} strokeWidth="2"/>
                        </svg>
                      ) : (
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                          <circle cx="11" cy="9" r="5" stroke="white" strokeWidth="2"/>
                          <path d="M11 15L11 20" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                          <path d="M7 20H15" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                        </svg>
                      )}
                    </button>
                  </div>
                );
              }
              const isAct = active === tab.id;
              return (
                <button key={tab.id} onClick={() => openPanel(tab.id)} style={{
                  flex:1, background:'transparent', border:'none', cursor:'pointer',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:3,
                  padding:'10px 0 8px',
                  color: isAct ? T.teal : T.muted,
                  transition:'color .2s ease, opacity .2s ease',
                  fontFamily:'DM Sans,sans-serif',
                }}>
                  {tab.icon(isAct ? T.teal : T.muted)}
                  <span style={{fontSize:9, fontWeight:isAct?600:400,
                    color:isAct?T.teal:T.muted, letterSpacing:.3}}>
                    {tab.label}
                  </span>
                  <div style={{
                    width: isAct ? 16 : 0, height:2, borderRadius:1,
                    background:T.teal,
                    transition:'width .25s cubic-bezier(.34,1.3,.64,1)',
                  }}/>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </>
  );
}

// ── ROUTE SHEET ────────────────────────────────────────────────
function RouteSheet({ onClose, onShowRoute, mapHook, userLoc, onPickModeChange }) {
  const [waypoints, setWaypoints] = useState([
    { value:'', latlng: userLoc || TASHKENT, placeholder:'Boshlanish manzili' },
    { value:'', latlng:null, placeholder:"Qayerga?" },
  ]);
  const [activeIdx, setActiveIdx] = useState(1);
  const [suggestions, setSuggestions] = useState([]);
  const [searching, setSearching] = useState(false);
  const [step, setStep] = useState('input');
  const [routeOptions, setRouteOptions] = useState([]);
  const [selectedRouteIdx, setSelectedRouteIdx] = useState(0);
  const [pickingIdx, setPickingIdx] = useState(null);
  const [pickAddr, setPickAddr] = useState('');
  const [pickLoading, setPickLoading] = useState(false);
  const debounceRef = useRef(null);
  const pickCenterRef = useRef(null);
  const moveCleanupRef = useRef(null);
  const revDebRef = useRef(null);

  // Start inputini joriy joylashuv matn manzili bilan to'ldirish (default)
  useEffect(() => {
    let alive = true;
    (async () => {
      const loc = userLoc || TASHKENT;
      const label = await reverseGeocode(loc);
      if (alive) setWaypoints(wp => wp.map((w,i)=> i===0 ? {...w, value:label, latlng:loc} : w));
    })();
    return () => { alive = false; };
  }, []);

  // Unmount: harakat tinglovchilarini tozalash
  useEffect(() => () => {
    if (moveCleanupRef.current) moveCleanupRef.current();
    clearTimeout(revDebRef.current);
  }, []);

  // ── Xaritadan markaz-pin orqali tanlash ──
  const refreshPickAddr = () => {
    const c = mapHook.getCenter(); if (!c) return;
    pickCenterRef.current = c;
    setPickLoading(true);
    clearTimeout(revDebRef.current);
    revDebRef.current = setTimeout(async () => {
      const here = mapHook.getCenter() || c;
      const label = await reverseGeocode(here);
      pickCenterRef.current = here;
      setPickAddr(label);
      setPickLoading(false);
    }, 400);
  };

  const enterMapPick = (idx) => {
    setSuggestions([]);
    setActiveIdx(idx);
    setPickingIdx(idx);
    onPickModeChange && onPickModeChange(true);
    const wp = waypoints[idx];
    const hasLoc = wp && wp.latlng;
    if (hasLoc) mapHook.flyTo(wp.latlng, 16);
    setPickAddr('');
    setPickLoading(true);
    setTimeout(() => {
      if (moveCleanupRef.current) moveCleanupRef.current();
      const c1 = mapHook.onMove(() => setPickLoading(true));
      const c2 = mapHook.onMoveEnd(() => refreshPickAddr());
      moveCleanupRef.current = () => { c1 && c1(); c2 && c2(); };
      refreshPickAddr();
    }, hasLoc ? 850 : 60);
  };

  const exitMapPick = () => {
    if (moveCleanupRef.current) { moveCleanupRef.current(); moveCleanupRef.current = null; }
    clearTimeout(revDebRef.current);
    setPickingIdx(null);
    setPickAddr('');
    setPickLoading(false);
    onPickModeChange && onPickModeChange(false);
  };

  const confirmPick = () => {
    const idx = pickingIdx;
    const c = pickCenterRef.current || mapHook.getCenter();
    if (idx !== null && c) {
      const label = pickAddr || `${c[0].toFixed(4)}, ${c[1].toFixed(4)}`;
      setWaypoints(wp => {
        const next = wp.map((w,i)=> i===idx ? {...w, value:label, latlng:c} : w);
        mapHook.setWaypointMarkers(next.filter(w=>w.latlng));
        return next;
      });
    }
    exitMapPick();
  };

  const handleInput = (idx, val) => {
    setWaypoints(wp => wp.map((w,i) => i===idx ? {...w,value:val,latlng:null} : w));
    clearTimeout(debounceRef.current);
    if (val.length < 2) { setSuggestions([]); return; }
    setSearching(true);
    debounceRef.current = setTimeout(async () => {
      const res = await geocode(val);
      setSuggestions(res.slice(0,5));
      setSearching(false);
    }, 400);
  };

  const handleSuggest = (s) => {
    const latlng = [parseFloat(s.lat), parseFloat(s.lon)];
    const label = s.display_name.split(',').slice(0,2).join(', ');
    setWaypoints(wp => wp.map((w,i) => i===activeIdx ? {...w,value:label,latlng} : w));
    setSuggestions([]);
    // Fly map to selected location
    mapHook.flyTo(latlng, 15);
    // Place start marker for reference
    mapHook.setWaypointMarkers(
      waypoints.map((w,i) => i===activeIdx ? {...w,value:label,latlng} : w)
    );
  };

  const addWaypoint = () => {
    setWaypoints(wp => [
      ...wp.slice(0,-1),
      {value:'',latlng:null,placeholder:'Oraliq nuqta'},
      wp[wp.length-1],
    ]);
  };

  const calcRoute = async () => {
    setStep('calculating');
    setSuggestions([]);
    const pts = waypoints.filter(w => w.latlng);
    if (pts.length >= 2) {
      const routes = await getRoute(pts.map(w => w.latlng));
      setRouteOptions(routes);
      setSelectedRouteIdx(0);
      mapHook.setWaypointMarkers(pts);
      if (routes.length > 0) mapHook.setRouteLines(routes, 0);
    }
    setStep('routes');
  };

  // Marshrutni faqat TANLASH (highlight) — hali boshlamaydi
  const pickRouteOption = (idx) => {
    setSelectedRouteIdx(idx);
    mapHook.setRouteLines(routeOptions, idx);
  };

  // Maxsus tugma: tanlangan marshrutni yurish uchun qurish
  const startSelectedRoute = () => {
    if (routeOptions[selectedRouteIdx]) onShowRoute(routeOptions[selectedRouteIdx]);
  };

  const canCalc = waypoints.every(w => w.latlng);
  const picking = pickingIdx !== null;

  return (
    <div style={{position:'absolute',inset:0,zIndex:20,pointerEvents: (picking || step==='routes') ? 'none':'auto'}}>
      {!picking && step!=='routes' && (
        <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)'}}/>
      )}

      {/* ── Xaritadan tanlash: markaz-pin + manzil popup + tasdiqlash ── */}
      {picking && (
        <>
          <div style={{position:'absolute',top:64,left:'50%',transform:'translateX(-50%)',
            background:T.glass2,backdropFilter:'blur(12px)',
            borderRadius:20,padding:'7px 16px',border:`1px solid ${T.teal}40`,
            pointerEvents:'none',whiteSpace:'nowrap'}}>
            <span style={{fontSize:12,color:T.teal,fontWeight:600}}>
              {pickingIdx===0?t('route.pickStart'):pickingIdx===waypoints.length-1?t('route.pickDest'):t('route.pickMid')} — {t('route.dragMap')}
            </span>
          </div>

          {/* Markaz pin + manzil popup (xarita markaziga) */}
          <div style={{position:'absolute',left:'50%',top:'50%',
            transform:'translate(-50%,-100%)',pointerEvents:'none',zIndex:5,
            display:'flex',flexDirection:'column',alignItems:'center'}}>
            <div style={{maxWidth:230,background:T.glass2,backdropFilter:'blur(12px)',
              borderRadius:12,padding:'8px 12px',marginBottom:8,
              border:`1px solid ${T.border}`,boxShadow:'0 6px 20px rgba(0,0,0,.5)'}}>
              <div style={{fontSize:12,color:T.text,fontWeight:600,textAlign:'center',
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {pickLoading ? t('route.detecting') : (pickAddr || t('route.pickPlace'))}
              </div>
            </div>
            <svg width="34" height="42" viewBox="0 0 34 42" style={{filter:'drop-shadow(0 4px 6px rgba(0,0,0,.5))'}}>
              <path d="M17 1C8.7 1 2 7.7 2 16c0 10.5 15 25 15 25s15-14.5 15-25C32 7.7 25.3 1 17 1z"
                fill={T.teal} stroke="#fff" strokeWidth="2"/>
              <circle cx="17" cy="16" r="5.5" fill="#fff"/>
            </svg>
          </div>
          {/* Aniq markaz nuqtasi */}
          <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
            width:8,height:8,borderRadius:4,background:'rgba(0,0,0,.4)',
            border:'1px solid rgba(255,255,255,.5)',pointerEvents:'none',zIndex:4}}/>

          {/* Tasdiqlash paneli (kichik) */}
          <div className="otw-sheet" style={{position:'absolute',left:0,right:0,bottom:0,
            background:T.surface,borderRadius:'20px 20px 0 0',
            padding:'16px 20px calc(28px + env(safe-area-inset-bottom,0px))',borderTop:`1px solid ${T.border}`,
            pointerEvents:'auto',zIndex:6,
            animation:'slideUp .3s cubic-bezier(.34,1.2,.64,1)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <div style={{width:36,height:36,borderRadius:11,background:T.tealDim,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📍</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,color:T.muted}}>{t('route.pickedAddr')}</div>
                <div style={{fontSize:13,fontWeight:600,color:T.text,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {pickLoading ? t('route.detecting') : (pickAddr || t('route.dragMapShort'))}
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={exitMapPick}
                style={{padding:'13px 18px',borderRadius:13,border:`1px solid ${T.border}`,
                  background:'transparent',color:T.muted,fontSize:14,fontWeight:600,
                  cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                {t('common.cancel')}
              </button>
              <button onClick={confirmPick} disabled={pickLoading || !pickAddr}
                style={{flex:1,padding:'13px',borderRadius:13,border:'none',
                  background:(pickLoading||!pickAddr)?T.surface2:`linear-gradient(135deg,${T.teal},#0e9e97)`,
                  color:(pickLoading||!pickAddr)?T.muted:'white',fontSize:15,fontWeight:600,
                  cursor:(pickLoading||!pickAddr)?'not-allowed':'pointer',
                  boxShadow:(pickLoading||!pickAddr)?'none':`0 4px 18px ${T.tealGlow}`,
                  fontFamily:'DM Sans,sans-serif',transition:'all .2s ease'}}>
                {t('common.confirm')}
              </button>
            </div>
          </div>
        </>
      )}

      {!picking && (
      <div className="otw-sheet" style={{position:'absolute',bottom:0,left:0,right:0,pointerEvents:'auto',
        background:T.surface,borderRadius:'24px 24px 0 0',
        animation:'slideUp .35s cubic-bezier(.34,1.2,.64,1)',
        maxHeight:'82%',display:'flex',flexDirection:'column',overflow:'hidden',
        paddingBottom:'env(safe-area-inset-bottom,0px)'}}>

        <div style={{width:36,height:4,borderRadius:2,background:T.border,margin:'12px auto 0'}}/>

        {/* Header */}
        <div style={{padding:'14px 20px 12px',display:'flex',alignItems:'center',gap:12,
          borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:10,
            border:`1px solid ${T.border}`,background:'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 7 H11 M7 3 L3 7 L7 11" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </button>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:T.text}}>{t('route.title')}</div>
            <div style={{fontSize:12,color:T.muted}}>{t('route.subtitle')}</div>
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'16px 20px'}}>
          {step === 'input' && <>
            {/* Waypoint inputs */}
            <div style={{display:'flex',gap:12}}>
              {/* Visual line */}
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:14,flexShrink:0}}>
                <div style={{width:10,height:10,borderRadius:5,background:T.teal,
                  border:`2px solid ${T.surface}`,boxShadow:`0 0 0 2px ${T.teal}`}}/>
                {waypoints.slice(0,-1).map((_,i)=>(
                  <React.Fragment key={i}>
                    <div style={{width:2,flex:1,minHeight:28,
                      background:`linear-gradient(to bottom,${T.teal},${T.muted}40)`}}/>
                    {i < waypoints.length-2 &&
                      <div style={{width:8,height:8,borderRadius:4,background:T.teal+'80'}}/>}
                  </React.Fragment>
                ))}
                <div style={{width:2,flex:1,minHeight:28,background:`${T.muted}40`}}/>
                <div style={{width:10,height:10,borderRadius:5,background:T.red,
                  border:`2px solid ${T.surface}`,boxShadow:`0 0 0 2px ${T.red}`}}/>
              </div>
              {/* Inputs */}
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                {waypoints.map((wp,idx)=>(
                  <div key={idx} style={{position:'relative'}}>
                    <input value={wp.value}
                      placeholder={wp.placeholder}
                      onChange={e=>handleInput(idx,e.target.value)}
                      onFocus={()=>{setActiveIdx(idx);setSuggestions([]);}}
                      style={{width:'100%',padding:'12px 68px 12px 14px',borderRadius:12,
                        background: activeIdx===idx?T.surface2:T.bg,
                        border:`1.5px solid ${activeIdx===idx?T.teal+'60':T.border}`,
                        color:T.text,fontSize:14,outline:'none',
                        transition:'all .2s ease',fontFamily:'DM Sans,sans-serif'}}/>
                    {/* Clear btn */}
                    {wp.value && (
                      <button onClick={()=>handleInput(idx,'')}
                        style={{position:'absolute',right:36,top:'50%',transform:'translateY(-50%)',
                          background:'transparent',border:'none',color:T.muted,cursor:'pointer',padding:4,fontSize:13}}>
                        ✕
                      </button>
                    )}
                    {/* Xaritadan tanlash btn */}
                    <button onClick={()=>enterMapPick(idx)}
                      title={t('form.pickOnMap')}
                      style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
                        width:24,height:24,borderRadius:7,border:'none',cursor:'pointer',
                        background: T.surface2,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        transition:'background .15s ease'}}>
                      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <circle cx="6" cy="5" r="3" stroke={T.muted} strokeWidth="1.4"/>
                        <path d="M6 9 L6 11" stroke={T.muted} strokeWidth="1.4" strokeLinecap="round"/>
                        <path d="M6 1 L6 2" stroke={T.muted} strokeWidth="1.4" strokeLinecap="round"/>
                        <path d="M1 5 L2 5" stroke={T.muted} strokeWidth="1.4" strokeLinecap="round"/>
                        <path d="M10 5 L11 5" stroke={T.muted} strokeWidth="1.4" strokeLinecap="round"/>
                      </svg>
                    </button>
                  </div>
                ))}
              </div>
            </div>

            {/* Add waypoint */}
            <button onClick={addWaypoint}
              style={{width:'100%',marginTop:8,padding:'10px',borderRadius:12,
                background:'transparent',border:`1px dashed ${T.border}`,
                color:T.muted,fontSize:13,cursor:'pointer',display:'flex',
                alignItems:'center',justifyContent:'center',gap:6,fontFamily:'DM Sans,sans-serif'}}>
              <span style={{fontSize:16}}>+</span> {t('route.addMidPoint')}
            </button>

            {/* Suggestions */}
            {searching && (
              <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8,padding:'8px 0'}}>
                <div style={{width:16,height:16,borderRadius:8,border:`2px solid ${T.tealDim}`,
                  borderTop:`2px solid ${T.teal}`,animation:'spin .7s linear infinite'}}/>
                <span style={{fontSize:12,color:T.muted}}>{t('form.searching')}</span>
              </div>
            )}
            {suggestions.length > 0 && (
              <div style={{marginTop:10,borderRadius:14,overflow:'hidden',border:`1px solid ${T.border}`}}>
                {suggestions.map((s,i)=>(
                  <button key={i} onClick={()=>handleSuggest(s)}
                    style={{width:'100%',padding:'11px 14px',
                      background:i%2===0?T.surface2:T.surface,
                      border:'none',borderBottom:i<suggestions.length-1?`1px solid ${T.border}`:'none',
                      color:T.text,fontSize:13,textAlign:'left',cursor:'pointer',
                      display:'flex',alignItems:'center',gap:10,fontFamily:'DM Sans,sans-serif'}}>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{flexShrink:0}}>
                      <circle cx="7" cy="6" r="3" stroke={T.muted} strokeWidth="1.5"/>
                      <path d="M7 10 L7 13" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {s.display_name.split(',').slice(0,3).join(', ')}
                    </span>
                  </button>
                ))}
              </div>
            )}

            <button onClick={calcRoute} disabled={!canCalc}
              style={{width:'100%',marginTop:14,padding:'15px',borderRadius:14,
                background:canCalc?`linear-gradient(135deg,${T.teal},#0e9e97)`:T.surface2,
                border:'none',color:canCalc?'white':T.muted,
                fontSize:15,fontWeight:600,cursor:canCalc?'pointer':'not-allowed',
                boxShadow:canCalc?`0 4px 20px ${T.tealGlow}`:'none',
                transition:'all .2s ease',fontFamily:'DM Sans,sans-serif'}}>
              {t('route.show')}
            </button>
          </>}

          {step === 'calculating' && (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',
              justifyContent:'center',gap:16,padding:'40px 0'}}>
              <div style={{width:48,height:48,borderRadius:24,
                border:`3px solid ${T.tealDim}`,borderTop:`3px solid ${T.teal}`,
                animation:'spin .8s linear infinite'}}/>
              <div style={{fontSize:14,color:T.muted}}>{t('route.calculating')}</div>
              <div style={{display:'flex',gap:6}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{width:6,height:6,borderRadius:3,background:T.teal,
                    animation:`dotBounce .8s ${i*.15}s ease-in-out infinite`}}/>
                ))}
              </div>
            </div>
          )}

          {step === 'routes' && (
            <>
              <div style={{fontSize:13,color:T.muted,marginBottom:12}}>
                {t('route.foundCount',{n:routeOptions.length})}
              </div>
              {routeOptions.length === 0 && (
                <div style={{padding:'20px',textAlign:'center',color:T.muted,fontSize:13}}>
                  {t('route.none')}
                </div>
              )}
              {routeOptions.map((rt,i)=>{
                const mins = Math.round(rt.duration/60);
                const km = (rt.distance/1000).toFixed(1);
                const labels=[t('route.labelFastest'),t('route.labelAlt1'),t('route.labelAlt2')];
                const notes=[t('route.noteOptimal'),t('route.noteLights'),t('route.noteAlt')];
                const sel = i===selectedRouteIdx;
                return (
                  <button key={i} onClick={()=>pickRouteOption(i)}
                    style={{width:'100%',marginBottom:8,padding:'14px 16px',borderRadius:14,
                      background:sel?T.tealDim:T.bg,
                      border:`1.5px solid ${sel?T.teal+'60':T.border}`,
                      display:'flex',alignItems:'center',gap:12,cursor:'pointer',fontFamily:'DM Sans,sans-serif',
                      boxShadow: sel ? `0 0 0 1px ${T.teal}30` : 'none',
                      transition:'all .15s ease'}}>
                    <div style={{width:36,height:36,borderRadius:10,
                      background:sel?T.teal:T.surface2,
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>
                      {i===0?'🏁':i===1?'🔀':'🛣️'}
                    </div>
                    <div style={{textAlign:'left',flex:1}}>
                      <div style={{fontSize:14,fontWeight:600,color:sel?T.teal:T.text}}>{labels[i]}</div>

              {routeOptions.length > 0 && (

                    background:`linear-gradient(135deg,${T.teal},#0e9e97)`,

// ── CALL SCREEN ────────────────────────────────────────────────
// App-owner (siz) — chaqiruvchi tomon profili
const ME = { initials:'AK', name:'Alisher Karimov', sub:"@alisher_k · Toshkent", accent: T.teal };
const partyColor = (p) => p.accent ? p.accent : (p.type==='driver' ? T.amber : T.purple);

function CallScreen({callee, phase, onAccept, onDecline, onEnd, onAgree}){
  const caller = ME; // siz
  const [secs,setSecs]=useState(0);
  const [muted,setMuted]=useState(false);
  // 'caller' = sizning ekraningiz, 'callee' = walker ekrani
  const [view,setView]=useState('caller');
  const ringing = phase==='ringing';
  const [agreed,setAgreed]=useState(false);  // birga ketish taklifi qabul qilindimi
  const agree = () => { setAgreed(true); onAgree && onAgree(); };

  // Faol qo'ng'iroq taymeri
  useEffect(()=>{
    if(phase==='active'){ const i=setInterval(()=>setSecs(c=>c+1),1000); return()=>clearInterval(i); }
  },[phase]);

  // Ringing paytida ikkala ekran galma-gal almashib turadi
  useEffect(()=>{
    if(!ringing) return;
    const i=setInterval(()=>setView(v=> v==='caller' ? 'callee' : 'caller'), 2800);
    return ()=>clearInterval(i);
  },[ringing]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  // Ko'rilayotgan telefon egasi va ekranda ko'rinadigan suhbatdosh
  const onCaller = view==='caller';
  const shown = onCaller ? callee : caller;     // ekrandagi katta avatar
  const color = partyColor(shown);
  const flip = () => setView(v=> v==='caller' ? 'callee' : 'caller');

  const status = phase==='active'
    ? fmt(secs)
    : onCaller ? t('call.calling') : t('call.incoming');

  return (
    <div className="otw-screen" style={{position:'absolute',inset:0,zIndex:30,
      background:'linear-gradient(160deg,#0d1220 0%,#0f1117 50%,#0a1018 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'calc(24px + env(safe-area-inset-top,0px)) 24px calc(60px + env(safe-area-inset-bottom,0px))'}}>

      {/* Perspektiva indikatori + almashtirish tugmasi */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,
        background:T.hover,border:`1px solid ${T.border}`,
        borderRadius:999,padding:'6px 8px 6px 14px'}}>
        <div style={{width:7,height:7,borderRadius:4,flexShrink:0,
          background: onCaller ? T.teal : color,
          boxShadow:`0 0 8px ${onCaller ? T.teal : color}`}}/>
        <span style={{fontSize:12,fontWeight:600,color:T.text,whiteSpace:'nowrap'}}>
          {onCaller ? t('call.yourScreen') : t('call.theirScreen',{name:callee.name.split(' ')[0]})}
        </span>
        <button onClick={flip} title={t('call.flipTip')} style={{
          width:26,height:26,borderRadius:8,flexShrink:0,
          border:`1px solid ${T.border}`,background:T.hover,
          color:T.muted,cursor:'pointer',fontSize:13,
          display:'flex',alignItems:'center',justifyContent:'center'}}>⇄</button>
      </div>
      <div style={{fontSize:10.5,color:T.muted,letterSpacing:.4,marginBottom:30}}>
        {ringing ? t('call.bothViews') : t('call.connected')}
      </div>

      {/* Statik glow (dekorativ) */}
      <div style={{position:'absolute',top:'22%',left:'50%',transform:'translateX(-50%)',
        width:280,height:280,borderRadius:140,
        background:`radial-gradient(circle,${color}12 0%,transparent 70%)`,pointerEvents:'none'}}/>

      {/* Almashganda yumshoq fade — haqiqiy flex ustun (matnlar ustma-ust tushmaydi) */}
      <div key={view+phase} style={{display:'flex',flexDirection:'column',alignItems:'center',
        width:'100%',animation:'fadeUp .35s ease both',position:'relative',zIndex:1}}>
        <div style={{position:'relative',marginBottom:26}}>
          {ringing && [1,2,3].map(i=>(
            <div key={i} style={{position:'absolute',top:'50%',left:'50%',
              transform:'translate(-50%,-50%)',width:80+i*36,height:80+i*36,borderRadius:'50%',
              border:`1px solid ${color}${Math.round(22/i).toString(16).padStart(2,'0')}`,
              animation:`ripple ${1+i*.4}s ${i*.2}s ease-out infinite`}}/>
          ))}
          <div style={{width:88,height:88,borderRadius:28,background:`${color}25`,
            border:`2.5px solid ${color}60`,display:'flex',alignItems:'center',
            justifyContent:'center',position:'relative',zIndex:1}}>
            <span style={{fontSize:32,fontWeight:700,color}}>{shown.initials}</span>
          </div>
        </div>
        <div style={{fontSize:22,fontWeight:700,color:T.text,textAlign:'center',
          lineHeight:1.25,maxWidth:300,textWrap:'balance'}}>{shown.name}</div>
        <div style={{fontSize:13,color:T.muted,textAlign:'center',marginTop:6,
          maxWidth:300,lineHeight:1.4}}>{shown.sub}</div>
        {phase==='active'
          ? <div style={{fontSize:18,color:T.teal,fontVariantNumeric:'tabular-nums',marginTop:14,fontWeight:600}}>{status}</div>
          : <div style={{fontSize:14,color,animation:'pulse 1.2s ease infinite',marginTop:14}}>{status}</div>
        }
      </div>

      {phase==='active' && (
        <div style={{display:'flex',gap:3,alignItems:'center',marginBottom:44,height:32}}>
          {[4,8,14,10,18,12,6,16,9,12,7].map((h,i)=>(
            <div key={i} style={{width:3,borderRadius:2,height:h,
              background:muted?T.muted:T.teal,opacity:muted?.4:1,
              animation:`dotBounce ${.4+i*.05}s ${i*.07}s ease-in-out infinite`}}/>
          ))}
        </div>
      )}

      {phase==='active'
        ? <div style={{marginTop:'auto',width:'100%',display:'flex',flexDirection:'column',
            alignItems:'center',gap:18}}>
            {/* Birga ketish taklifi */}
            {agreed
              ? <div style={{width:'100%',display:'flex',alignItems:'center',gap:11,
                  background:T.green+'1c',border:`1px solid ${T.green}55`,borderRadius:15,
                  padding:'12px 14px',animation:'fadeUp .3s ease both'}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:T.green,flexShrink:0,
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,color:'#fff'}}>✓</div>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:13.5,fontWeight:700,color:T.green}}>{t('call.agreedTitle')}</div>
                    <div style={{fontSize:11,color:T.muted,marginTop:1}}>{t('call.agreedSub',{name:callee.name.split(' ')[0]})}</div>
                  </div>
                </div>
              : onCaller
                // Chaqiruvchining ekrani — taklif yuborilgan, javob kutilmoqda
                ? <div style={{display:'flex',alignItems:'center',gap:8,
                    background:T.surface2,border:`1px solid ${T.border}`,borderRadius:999,
                    padding:'8px 16px',animation:'fadeUp .3s ease both'}}>
                    <div style={{width:6,height:6,borderRadius:3,background:T.amber,
                      animation:'pulse 1.1s ease infinite'}}/>
                    <span style={{fontSize:12,color:T.muted,fontWeight:500}}>{t('call.offerPending')}</span>
                  </div>
                // Qabul qiluvchining ekrani — birga ketishni tasdiqlash tugmasi
                : <div style={{width:'100%',display:'flex',flexDirection:'column',
                    alignItems:'center',gap:9,animation:'fadeUp .3s ease both'}}>
                    <button onClick={agree}
                      style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:9,
                        background:T.green,border:'none',borderRadius:15,padding:'15px 18px',
                        cursor:'pointer',fontFamily:'DM Sans,sans-serif',
                        boxShadow:`0 6px 22px ${T.green}55`}}>
                      <span style={{fontSize:19}}>🤝</span>
                      <span style={{fontSize:15,fontWeight:700,color:'#fff'}}>{t('call.agreeBtn')}</span>
                    </button>
                    <div style={{fontSize:11,color:T.muted,textAlign:'center',
                      lineHeight:1.45,maxWidth:280}}>{t('call.offerHint')}</div>
                  </div>
            }
            <div style={{display:'flex',gap:20}}>
              <CallBtn icon={muted?'🔇':'🎙'} label={muted?t('call.unmute'):t('call.mute')} color={T.surface2} small onClick={()=>setMuted(m=>!m)}/>
              <CallBtn icon="✕" label={t('call.end')} color={T.red} onClick={onEnd}/>
              <CallBtn icon="📢" label={t('call.speaker')} color={T.surface2} small/>
            </div>
          </div>
        : onCaller
          // Sizning ekraningiz (chaquruvchi) — faqat bekor qilish
          ? <div style={{display:'flex',justifyContent:'center',marginTop:'auto'}}>
              <CallBtn icon="✕" label={t('call.cancel')} color={T.red} onClick={onDecline}/>
            </div>
          // Walker ekrani (qabul qiluvchi) — rad / qabul
          : <div style={{display:'flex',gap:40,marginTop:'auto'}}>
              <CallBtn icon="✕" label={t('call.decline')} color={T.red} onClick={onDecline}/>
              <CallBtn icon="✓" label={t('call.accept')} color={T.green} onClick={onAccept}/>
            </div>
      }
    </div>
  );
}

  const arrival = new Date(Date.now() + remMin * 60000)
    .toLocaleTimeString('uz', { hour: '2-digit', minute: '2-digit', hour12: false });
  return (
    <div className="otw-dockleft" style={{position:'absolute',left:12,right:12,bottom:116,zIndex:3,pointerEvents:'auto',
      background:T.glass2,backdropFilter:'blur(20px)',borderRadius:18,
      border:`1px solid ${done?T.green+'40':T.teal+'30'}`,

              <path d="M11 2 L19 20 L11 15 L3 20 Z" fill={T.teal}/>

          )}
        </div>
        <div style={{flex:1,minWidth:0}}>
          {done ? (
            <div style={{fontSize:15,fontWeight:700,color:T.green}}>{t('nav2.arrived')}</div>
          ) : (
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontSize:20,fontWeight:700,color:T.text,fontVariantNumeric:'tabular-nums'}}>{remMin} min</span>
              <span style={{fontSize:13,color:T.muted}}>{t('nav2.remaining',{km:remKm})}</span>

        </div>
        <button onClick={onEnd} title={t('nav2.endTip')}
          style={{width:38,height:38,borderRadius:12,flexShrink:0,
            border:`1px solid ${T.red}40`,background:'rgba(255,92,114,0.1)',
            color:T.red,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="13" height="13" viewBox="0 0 12 12" fill="none">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </button>
      </div>
      {/* progress bar */}
      <div style={{marginTop:12,height:6,borderRadius:3,background:T.bg,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,borderRadius:3,
          background: done ? T.green : `linear-gradient(to right,${T.teal},#0e9e97)`,
          transition:'width .45s linear'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
        <span style={{fontSize:10,color:done?T.green:T.teal,fontWeight:600}}>{pct}%</span>
        <span style={{fontSize:10,color:T.muted}}>
          {route.distanceKm.toFixed(1)} km · {Math.round(route.durationMin)} min
        </span>
      </div>
    </div>
  );
}

// ── XARITADAN MANZIL TANLASH OVERLAY (filtr/qo'shish uchun) ──────
function MapPickOverlay({ mapHook, label, initial, onConfirm, onCancel }) {
  const [addr, setAddr] = useState('');
  const [loading, setLoading] = useState(true);
  const centerRef = useRef(null);
  const cleanupRef = useRef(null);
  const debRef = useRef(null);

  const refresh = () => {
    const c = mapHook.getCenter(); if (!c) return;
    centerRef.current = c;
    setLoading(true);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(async () => {
      const here = mapHook.getCenter() || c;
      const lbl = await reverseGeocode(here);
      centerRef.current = here; setAddr(lbl); setLoading(false);
    }, 400);
  };
  useEffect(() => {
    if (initial) mapHook.flyTo(initial, 16);
    const t = setTimeout(() => {
      const c1 = mapHook.onMove(() => setLoading(true));
      const c2 = mapHook.onMoveEnd(() => refresh());
      cleanupRef.current = () => { c1&&c1(); c2&&c2(); };
      refresh();
    }, initial ? 850 : 60);
    return () => { clearTimeout(t); if (cleanupRef.current) cleanupRef.current(); clearTimeout(debRef.current); };
  }, []);

  const confirm = () => {
    const c = centerRef.current || mapHook.getCenter();
    if (c) onConfirm({ latlng:c, label: addr || `${c[0].toFixed(4)}, ${c[1].toFixed(4)}` });
  };

  return (
    <div style={{position:'absolute',inset:0,zIndex:24,pointerEvents:'none'}}>
      <div style={{position:'absolute',top:64,left:'50%',transform:'translateX(-50%)',
        background:T.glass2,backdropFilter:'blur(12px)',borderRadius:20,
        padding:'7px 16px',border:`1px solid ${T.teal}40`,pointerEvents:'none',whiteSpace:'nowrap'}}>
        <span style={{fontSize:12,color:T.teal,fontWeight:600}}>{label} — {t('route.dragMap')}</span>
      </div>

      {/* Markaz pin + manzil popup */}
      <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-100%)',
        pointerEvents:'none',zIndex:5,display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{maxWidth:230,background:T.glass2,backdropFilter:'blur(12px)',
          borderRadius:12,padding:'8px 12px',marginBottom:8,border:`1px solid ${T.border}`,
          boxShadow:'0 6px 20px rgba(0,0,0,.5)'}}>
          <div style={{fontSize:12,color:T.text,fontWeight:600,textAlign:'center',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {loading ? t('route.detecting') : (addr || t('route.pickPlace'))}
          </div>
        </div>
        <svg width="34" height="42" viewBox="0 0 34 42" style={{filter:'drop-shadow(0 4px 6px rgba(0,0,0,.5))'}}>
          <path d="M17 1C8.7 1 2 7.7 2 16c0 10.5 15 25 15 25s15-14.5 15-25C32 7.7 25.3 1 17 1z"
            fill={T.teal} stroke="#fff" strokeWidth="2"/>
          <circle cx="17" cy="16" r="5.5" fill="#fff"/>
        </svg>
      </div>
      <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
        width:8,height:8,borderRadius:4,background:'rgba(0,0,0,.4)',
        border:'1px solid rgba(255,255,255,.5)',pointerEvents:'none',zIndex:4}}/>

      {/* Tasdiqlash paneli */}
      <div style={{position:'absolute',left:0,right:0,bottom:0,background:T.surface,
        borderRadius:'20px 20px 0 0',padding:'16px 20px 28px',borderTop:`1px solid ${T.border}`,
        pointerEvents:'auto',zIndex:6,animation:'slideUp .3s cubic-bezier(.34,1.2,.64,1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <div style={{width:36,height:36,borderRadius:11,background:T.tealDim,

          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:T.muted}}>{label}</div>
            <div style={{fontSize:13,fontWeight:600,color:T.text,
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {loading ? t('route.detecting') : (addr || t('route.dragMapShort'))}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel} style={{padding:'13px 18px',borderRadius:13,
            border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:14,
            fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>{t('common.cancel')}</button>
          <button onClick={confirm} disabled={loading || !addr} style={{flex:1,padding:'13px',
            borderRadius:13,border:'none',
            background:(loading||!addr)?T.surface2:`linear-gradient(135deg,${T.teal},#0e9e97)`,
            color:(loading||!addr)?T.muted:'white',fontSize:15,fontWeight:600,
            cursor:(loading||!addr)?'not-allowed':'pointer',
            boxShadow:(loading||!addr)?'none':`0 4px 18px ${T.tealGlow}`,
            fontFamily:'DM Sans,sans-serif',transition:'all .2s ease'}}>{t('common.confirm')}</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('loading');
  const [mode, setMode] = useState(null);
  const [, forceTheme] = useState(0);
  useEffect(() => themeStore.subscribe(() => forceTheme(n => n + 1)), []);
  // Til almashtirilganda butun daraxt qayta render boʻladi (themeStore bilan bir xil yondashuv)
  useEffect(() => i18nStore.subscribe(() => forceTheme(n => n + 1)), []);
  const [showSheet, setShowSheet] = useState(false);
  const [showMatching, setShowMatching] = useState(false);
  const [selectedUser, setSelectedUser] = useState(null);
  const [callState, setCallState] = useState(null);
  const [chatUser, setChatUser] = useState(null);
  const [pushNotif, setPushNotif] = useState(null);
  const [mapStyle, setMapStyle] = useState('dark');
  const [matchCount, setMatchCount] = useState(0);
  const [routePicking, setRoutePicking] = useState(false);
  const [activeRoute, setActiveRoute] = useState(null);
  const [navProgress, setNavProgress] = useState(0);
  const [navTask, setNavTask] = useState(null); // {type:'pick'|'preview', ...}
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [overlayPanel, setOverlayPanel] = useState(null); // 'settings' | 'complaint' | 'privacy'
  const mapContainerRef = useRef(null);

  const Sim = window.WalkerSim;
  const userLocRef = useRef(null);
  const simRef = useRef(null);
  const simWalkersRef = useRef([]);
  const mapStyleRef = useRef('dark');
  const navTimerRef = useRef(null);
  const navProgRef = useRef(0);
  const activeRouteRef = useRef(null);

  const mapHook = useMap(mapContainerRef, screen === 'map');

  useEffect(() => { mapHook.setMapStyle && mapHook.setMapStyle(mapStyle); }, [mapStyle, screen]);

  // Walkerni UserPopup uchun formatlash (jonli masofa / ETA)
  const formatForPopup = useCallback((w) => {
    const userLoc = userLocRef.current || (Sim ? Sim.TASHKENT : TASHKENT);
    const km = Sim ? Sim.haversine(userLoc, w.position) : 0;
    const etaMin = Math.max(1, Math.round(km / 0.4)); // ~24 km/soat
    return {
      id: w.id, type: w.type, initials: w.initials, name: w.name, color: w.color,
      sub: w.type === 'driver' ? `${w.vehicle} · ${w.seats} ${t('common.seats')}` : t('userPopup.sub'),
      dist: km.toFixed(1) + ' km', eta: etaMin + ' min',
      rating: (typeof w.rating === 'number' ? w.rating.toFixed(1) : w.rating),
      trips: w.trips, latlng: w.position,
    };
  }, [Sim]);

  const openWalker = useCallback((id) => {
    const w = simWalkersRef.current.find((x) => x.id === id);
    if (w) setSelectedUser(formatForPopup(w));
  }, [formatForPopup]);

  // Walker tanlanганда uning marshrutini ajratib ko'rsatish (qolganlari xira),
  //  popup yopilganda hammasi normal holatga qaytadi.
  useEffect(() => {
    if (!mapHook.highlightWalker) return;
    if (screen !== 'map') return;
    mapHook.highlightWalker(selectedUser ? selectedUser.id : null);
  }, [selectedUser, screen]);

  // ── Walkerlarni generatsiya + simulyatsiyani ishga tushirish ──
  const buildSim = useCallback(async () => {
    if (!Sim || screen !== 'map' || !mode) return;
    if (simRef.current) { simRef.current.stop(); simRef.current = null; }
    mapHook.clearWalkers();
    const oppo = mode === 'driver' ? 'passenger' : 'driver';
    const userLoc = userLocRef.current || Sim.randomUserLocation();
    userLocRef.current = userLoc;
    mapHook.setUserLocation(userLoc);
    const n = simStore.get();
    const walkers = await Sim.generateWalkers(userLoc, oppo, n);
    // Joriy lokatsiyadan eng yaqinlari (kafolat uchun saralab)
    walkers.sort((a, b) => Sim.haversine(userLoc, a.start) - Sim.haversine(userLoc, b.start));
    const sim = Sim.createSimulation(walkers, {
      intervalMs: 450,
      onTick: (ws) => { simWalkersRef.current = ws; mapHook.tickWalkers(ws); },
    });
    simRef.current = sim;
    const enriched = sim.enriched();
    simWalkersRef.current = enriched;
    mapHook.renderWalkers(enriched, mapStyleRef.current, openWalker);
    mapHook.fitWalkers(userLoc, enriched);
    sim.start();
    setMatchCount(enriched.length);
    setShowMatching(true);
    const nearest = enriched.slice().sort((a, b) =>
      Sim.haversine(userLoc, a.position) - Sim.haversine(userLoc, b.position))[0];
    if (nearest) {
      const f = formatForPopup(nearest);
      setPushNotif({ title: t('push.matchTitle'), body: `${f.name} • ${f.dist} • ${f.eta}`, user: f });
    }
  }, [Sim, screen, mode, mapHook, openWalker, formatForPopup]);

  // Map'ga kirilganda sim ishga tushadi; chiqilganda to'xtaydi
  useEffect(() => {
    if (screen === 'map' && mode) buildSim();
    return () => { if (simRef.current) { simRef.current.stop(); simRef.current = null; } };
  }, [screen, mode]);

  // Sozlamalarda N o'zgarsa — qayta generatsiya
  useEffect(() => {
    const h = () => { if (screen === 'map' && mode) buildSim(); };
    window.addEventListener('ontheway:simcount', h);
    return () => window.removeEventListener('ontheway:simcount', h);
  }, [screen, mode, buildSim]);

  // Map stili o'zgarsa — walkerlarni yangi kontrast tema bilan qayta chizish
  useEffect(() => {
    mapStyleRef.current = mapStyle;
    if (simRef.current && screen === 'map') {
      mapHook.renderWalkers(simWalkersRef.current, mapStyle, openWalker);
    }
    mapHook.recolorUserRoute && mapHook.recolorUserRoute(mapStyle);
  }, [mapStyle]);

  // Marshrut yaratishni ochish: boshqa walkerlar disabled (xira + to'xtatilgan)
  const openRouteSheet = () => {
    if (activeRouteRef.current) {
      setPushNotif({ title: t('push.routeActiveTitle'), body: t('push.routeActiveBody') });
      return;
    }
    if (simRef.current) simRef.current.stop();
    mapHook.setWalkersDimmed(true);
    setShowSheet(true);
  };
  // Bekor/yopish: walkerlar yana faollashadi, rejalashtirish izlari tozalanadi
  const closeRouteSheet = () => {
    setShowSheet(false);
    setRoutePicking(false);
    mapHook.setWalkersDimmed(false);
    if (!activeRouteRef.current) mapHook.clearPlanning();
    if (simRef.current) simRef.current.start();
  };

  // Marshrut TO'LIQ qurilgach — serverdan o'sha marshrutga eng mos walkerlar topiladi
  const handleRouteSelected = async (route) => {
    setShowSheet(false);
    setRoutePicking(false);
    if (!Sim || !route || !route.geometry) return;
    const coords = route.geometry.coordinates.map((c) => [c[1], c[0]]);
    const userLoc = userLocRef.current || Sim.randomUserLocation();
    userLocRef.current = userLoc;
    if (simRef.current) { simRef.current.stop(); simRef.current = null; }
    mapHook.clearWalkers();
    mapHook.setUserLocation(userLoc);
    const oppo = mode === 'driver' ? 'passenger' : 'driver';
    const n = simStore.get();
    const walkers = await Sim.generateWalkersForRoute(coords, oppo, n);
    walkers.sort((a, b) => Sim.haversine(userLoc, a.start) - Sim.haversine(userLoc, b.start));
    const sim = Sim.createSimulation(walkers, {
      intervalMs: 450,
      onTick: (ws) => { simWalkersRef.current = ws; mapHook.tickWalkers(ws); },
    });
    simRef.current = sim;
    const enriched = sim.enriched();
    simWalkersRef.current = enriched;
    mapHook.renderWalkers(enriched, mapStyleRef.current, openWalker);
    mapHook.fitWalkers(userLoc, enriched);
    sim.start();
    setMatchCount(enriched.length);
    setShowMatching(true);
    const nearest = enriched.slice().sort((a, b) =>
      Sim.haversine(userLoc, a.position) - Sim.haversine(userLoc, b.position))[0];
    if (nearest) {
      const f = formatForPopup(nearest);
      setPushNotif({ title: t('push.routeMatchTitle'), body: `${f.name} • ${f.dist} • ${f.eta}`, user: f });
    }

    // App-owner marshruti: SOLID chiziq + foydalanuvchi yurishini simulyatsiya
    mapHook.setRouteLines([]); // muqobil previewlarni olib tashlash
    mapHook.renderUserRoute(coords, mapStyleRef.current);
    mapHook.fitRoute(coords);
    startUserNav(route, coords);
  };

  // ── App-owner (foydalanuvchi) yurishini simulyatsiya qilish ──
  const startUserNav = (route, coords) => {
    if (navTimerRef.current) { clearInterval(navTimerRef.current); navTimerRef.current = null; }
    navProgRef.current = 0;
    setNavProgress(0);
    const distanceKm = route.distance / 1000;
    const durationMin = route.duration / 60;
    const ar = { coords, distanceKm, durationMin };
    activeRouteRef.current = ar;
    setActiveRoute(ar);
    const intervalMs = 500;
    // Sekinroq, masofaga mos: piyoda tezligiga yaqinroq (min ~2.5 daqiqa)
    const demoMs = Math.min(360000, Math.max(150000, distanceKm * 150000));
    const stepInc = intervalMs / demoMs;
    navTimerRef.current = setInterval(() => {
      navProgRef.current = Math.min(1, navProgRef.current + stepInc);
      const p = navProgRef.current;
      const s = Sim.splitRoute(coords, p);
      mapHook.updateUserRoute(s.traveled, s.remaining);
      // Yurish yo'nalishi bo'yicha arrow uchini burish
      let heading = null;
      if (s.remaining && s.remaining.length >= 2) heading = Sim.bearing(s.remaining[0], s.remaining[1]);
      else if (s.traveled && s.traveled.length >= 2) heading = Sim.bearing(s.traveled[s.traveled.length-2], s.traveled[s.traveled.length-1]);
      if (s.position) mapHook.setUserLocation(s.position, heading);
      setNavProgress(p);
      if (p >= 1) { clearInterval(navTimerRef.current); navTimerRef.current = null; }
    }, intervalMs);
  };

  // Marshrutni yakunlash (X tugmasi) — barcha izlar tozalanadi
  const endRoute = () => {
    if (navTimerRef.current) { clearInterval(navTimerRef.current); navTimerRef.current = null; }
    mapHook.clearUserRoute();
    mapHook.clearPlanning();
    activeRouteRef.current = null;
    navProgRef.current = 0;
    setActiveRoute(null);
    setNavProgress(0);
    if (userLocRef.current) mapHook.setUserLocation(userLocRef.current);
  };

  const handleCall = (user) => {
    setSelectedUser(null);
    setCallState({ user, phase: 'ringing' });
  };

  // ── Schedule panel xarita vazifalari (manzil tanlash / walker marshruti) ──
  const walkerToCallUser = (w) => ({
    id:w.id, type:w.type, initials:w.initials, name:w.name,
    sub: w.type==='driver' ? `${w.vehicle} · ${w.seats} ${t('common.seats')}` : t('common.passenger'),
    rating: w.rating, latlng: w.fromLatlng,
  });
  const handleMapTask = async (task) => {
    if (task.type === 'pick') {
      mapHook.setWalkersDimmed(true);
      setNavTask({ type:'pick', label:task.label, initial:task.current, onDone:task.onDone });
    } else if (task.type === 'preview') {
      mapHook.setWalkersDimmed(true);
      const dist = haversineKm(userLocRef.current || TASHKENT, task.walker.fromLatlng);
      setNavTask({ type:'preview', walker:task.walker, loading:true, dist });
      const data = await RouteServer.fetch(task.walker); // serverdan tayyor marshrut
      mapHook.showPreviewRoute(data.coords);
      setNavTask({ type:'preview', walker:task.walker, loading:false, data, dist });
    } else if (task.type === 'contactFocus') {
      // Faqat joriy lokatsiya + tanlangan kontakt ko'rinadi; qolgan walkerlar yashiriladi
      const c = task.contact;
      if (simRef.current) simRef.current.stop();
      mapHook.hideWalkers(true);
      mapHook.clearPreviewRoute();
      let route = null, pos = c.latlng;
      if (c.hasRoute) {
        const data = await RouteServer.fetch(c); // serverda marshruti bo'lsa — yuklab chizamiz
        route = data.coords;
        if (Sim && route && route.length > 1) {
          const s = Sim.splitRoute(route, 0.42);
          if (s && s.position) pos = s.position;
        }
      }
      const color = c.type === 'driver' ? T.amber : T.purple;
      mapHook.showContactFocus({ ...c, latlng: pos, route, color });
      const pts = [userLocRef.current || TASHKENT, pos];
      if (route) route.forEach(p => pts.push(p));
      mapHook.fitPoints(pts);
    } else if (task.type === 'contactClear') {
      mapHook.clearPreviewRoute();
      mapHook.hideWalkers(false);
      if (simRef.current) simRef.current.start();
      mapHook.fitWalkers(userLocRef.current, simWalkersRef.current || []);
    }
  };
  // Kontaktni qo'ng'iroq / chat uchun formatlash
  const contactToUser = (c) => ({
    id:c.id, type:c.type, initials:c.initials, name:c.name,
    sub: c.type==='driver' ? (c.vehicle || t('common.driver')) : t('common.passenger'),
    rating: c.rating, latlng: c.latlng,
  });

  // Chat ochilganda o'sha suhbatdoshning o'qilmagan xabarlari 0 bo'ladi
  useEffect(() => { if (chatUser) unreadStore.clear(chatUser.id); }, [chatUser]);

  // Timer ichida joriy chat/qo'ng'iroq holatini o'qish uchun reflar
  const chatUserRef = useRef(null);
  const callStateRef = useRef(null);
  useEffect(() => { chatUserRef.current = chatUser; }, [chatUser]);
  useEffect(() => { callStateRef.current = callState; }, [callState]);

  // Xarita walker ikonkalaridagi badge'larni o'qilmagan xabarlar bilan sinxronlash
  useEffect(() => {
    const sync = () => mapHook.setWalkerBadges && mapHook.setWalkerBadges(unreadStore.map());
    sync();
    window.addEventListener('ontheway:unread', sync);
    return () => window.removeEventListener('ontheway:unread', sync);
  }, [mapHook, screen]);

  // Yangi xabar kelishini simulyatsiya qilish (xarita walkerlari + kontaktlar)
  useEffect(() => {
    if (screen !== 'map' || !mode) return;
    let timer;
    const fire = () => {
      // Chat yoki qo'ng'iroq ochiq bo'lsa — xabar yuborilmaydi
      if (!chatUserRef.current && !callStateRef.current) {
        const walkers = simWalkersRef.current || [];
        const pool = [
          ...walkers.map(w => ({ k:'w', o:w })),
          ...CONTACTS_DATA.map(c => ({ k:'c', o:c })),
        ];
        if (pool.length) {
          const pick = pool[Math.floor(Math.random() * pool.length)];
          const target = pick.k==='w' ? formatForPopup(pick.o) : contactToUser(pick.o);
          unreadStore.add(target.id, 1);
          const body = t(CHAT_REPLY_KEYS[Math.floor(Math.random() * CHAT_REPLY_KEYS.length)]);
          setPushNotif({ title: target.name, body, user: target, chat: true, action: t('common.chat') });
        }
      }
      timer = setTimeout(fire, 8000 + Math.random() * 9000);
    };
    timer = setTimeout(fire, 6000 + Math.random() * 6000);
    return () => clearTimeout(timer);
  }, [screen, mode, formatForPopup]);
  const finishPick = (point) => {
    setNavTask(t => { if (t && t.onDone) t.onDone(point); return null; });
    mapHook.setWalkersDimmed(false);
  };
  const cancelTask = () => {
    mapHook.clearPreviewRoute();
    mapHook.setWalkersDimmed(false);
    setNavTask(null);
  };

  const handleAgreeRide = () => {
    const u = callState && callState.user;
    if (!u) return;
    // Tizimga "birga ketish" sifatida saqlanadi (Saqlangan \u2192 Hamrohlar)
    const pid = 'partner-' + u.id;
    if (!savedStore.has(pid)) {
      savedStore.toggle({ id: pid, type: 'partner', initials: u.initials, label: u.name, sub: u.sub });
    }
    setPushNotif({
      title: t('push.rideAgreedTitle'),
      body: t('push.rideAgreedBody', { name: u.name.split(' ')[0] }),
    });
  };

  const handleAcceptCall = () => {
    setCallState(c => ({ ...c, phase: 'active' }));
    const userLoc = userLocRef.current || TASHKENT;
    const from = (callState && callState.user && callState.user.latlng) || [41.310, 69.255];
    const stop = mapHook.startTracking(from, userLoc, (frac) => { /* ETA */ });
    return stop;
  };

  // Rejim tanlash (home) ekraniga qaytish
  const exitToHome = () => {
    setScreen('home'); setShowMatching(false); setShowSheet(false); setRoutePicking(false);
    if(navTimerRef.current){clearInterval(navTimerRef.current);navTimerRef.current=null;}
    activeRouteRef.current=null; setActiveRoute(null); setNavProgress(0);
    mapHook.clearUserRoute(); mapHook.clearPlanning();
    if(simRef.current){simRef.current.stop();simRef.current=null;}
    mapHook.clearWalkers(); userLocRef.current=null; setMatchCount(0);
  };

  return (
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',
      background:T.bg,fontFamily:'DM Sans,sans-serif'}}>

      {/* OSM Map — always mounted when screen=map */}
      <div ref={mapContainerRef}
        style={{position:'absolute',inset:0,zIndex:0,
          display: screen==='map' ? 'block' : 'none'}}/>

      {screen === 'loading' && <LoadingScreen onDone={()=>setScreen('home')}/>}

      {screen === 'home' && (
        <HomeScreen onSelect={m=>{ setMode(m); setScreen('map'); }}/>
      )}

      {screen === 'map' && !callState && (
        <>
          <MapUI
            mode={mode}
            mapHook={mapHook}
            showMatching={showMatching && !showSheet}
            matchCount={matchCount}
            routeActive={!!activeRoute}
            activeRoute={activeRoute}
            navProgress={navProgress}
            onEndRoute={endRoute}
            onRouteSheet={openRouteSheet}
            userLoc={userLocRef.current}
            onMapTask={handleMapTask}
            navHidden={!!navTask}
            onMenu={()=>setDrawerOpen(true)}
            onContactCall={(c)=>handleCall(contactToUser(c))}
            onContactSms={(c)=>setChatUser(contactToUser(c))}
            mapStyle={mapStyle}
            onMapStyleChange={setMapStyle}
          />
          <SideDrawer
            open={drawerOpen}
            onClose={()=>setDrawerOpen(false)}
            mode={mode}
            onModeChange={(m)=>{ if(m!==mode) setMode(m); }}
            onExit={()=>{ setDrawerOpen(false); exitToHome(); }}
            onOpenPanel={(key)=>{ setDrawerOpen(false); setOverlayPanel(key); }}
          />
          {showSheet && (
            <div style={{position:'absolute',inset:0,zIndex:20,pointerEvents:'none'}}>
              <RouteSheet
                mapHook={mapHook}
                userLoc={userLocRef.current}
                onPickModeChange={setRoutePicking}
                onClose={closeRouteSheet}
                onShowRoute={handleRouteSelected}
              />
            </div>
          )}
          {selectedUser && !showSheet && (
            <UserPopup
              user={selectedUser}
              onClose={()=>setSelectedUser(null)}
              onCall={()=>handleCall(selectedUser)}
              onChat={()=>{ setChatUser(selectedUser); setSelectedUser(null); }}
            />
          )}
          <PushToast
            notif={pushNotif}
            onDismiss={()=>setPushNotif(null)}
            onView={(n)=>{
              setPushNotif(null);
              if (n && n.chat && n.user) { setChatUser(n.user); }
              else if (n && n.user) { setSelectedUser(n.user); }
            }}
          />

          {/* Schedule paneldan xarita vazifalari */}
          {navTask && navTask.type==='pick' && (
            <MapPickOverlay
              mapHook={mapHook}
              label={navTask.label}
              initial={navTask.initial}
              onConfirm={finishPick}
              onCancel={cancelTask}
            />
          )}
          {navTask && navTask.type==='preview' && (
            <WalkerPreviewCard
              task={navTask}
              onBack={cancelTask}
              onCall={(w)=>{ cancelTask(); handleCall(walkerToCallUser(w)); }}
              onChat={(w)=>{ cancelTask(); setChatUser(walkerToCallUser(w)); }}
            />
          )}
        </>
      )}

      {callState && (
        <CallScreen
          callee={callState.user}
          phase={callState.phase}
          onAccept={handleAcceptCall}
          onAgree={handleAgreeRide}
          onDecline={()=>setCallState(null)}
          onEnd={()=>setCallState(null)}
        />
      )}

      {chatUser && (
        <ChatScreen user={chatUser} onBack={()=>setChatUser(null)}/>
      )}

      {/* Chap menyudan ochiladigan alohida panellar — yopilganda xaritaga qaytadi */}
      {overlayPanel === 'settings' && <SettingsScreen onClose={()=>setOverlayPanel(null)}/>}
      {overlayPanel === 'complaint' && <ComplaintScreen onClose={()=>setOverlayPanel(null)}/>}
      {overlayPanel === 'privacy' && <PrivacyScreen onClose={()=>setOverlayPanel(null)}/>}
    </div>
  );
}

// ── ROOT ───────────────────────────────────────────────────────
function Root() {
  const { useTweaks, TweaksPanel, TweakSection, TweakToggle } = window;
  const tweaks = useTweaks(/*EDITMODE-BEGIN*/{"showFrame": false}/*EDITMODE-END*/);

  return (
    <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center',
      width:'100%',height:'100%'}}>
      {tweaks.showFrame ? (
        <div style={{position:'relative'}}>
          {/* Phone frame */}
          <div style={{width:430,height:932,borderRadius:54,
            background:'#1a1a1a',border:'10px solid #2a2a2a',
            boxShadow:'0 30px 80px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.08)',
            display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',position:'relative'}}>
            {/* Notch */}
            <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',
              width:120,height:34,background:'#1a1a1a',borderRadius:'0 0 20px 20px',zIndex:100}}/>
            <div style={{width:390,height:844,borderRadius:46,overflow:'hidden',position:'relative'}}>
              <App/>
            </div>
          </div>
        </div>
      ) : (
        <div style={{width:'100%',height:'100%',maxWidth:1024,position:'relative',
          boxShadow:'0 0 0 1px rgba(255,255,255,.04), 0 30px 90px rgba(0,0,0,.5)'}}>
          <App/>
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Display">
          <TweakToggle id="showFrame" label="iPhone Frame" tweaks={tweaks}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
<div id="root" style="width:100%;height:100%;"></div>
</body>
</html>
