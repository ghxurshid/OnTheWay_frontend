*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* Leaflet overrides */
.leaflet-container{background:#0d1018!important}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{display:none!important}
.leaflet-grab{cursor:grab!important}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.15)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes callPulse{0%,100%{box-shadow:0 0 0 0 rgba(31,200,192,.4)}50%{box-shadow:0 0 0 16px rgba(31,200,192,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes markerPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes antMarch{to{stroke-dashoffset:-20}}

  box-shadow:0 2px 12px rgba(0,0,0,.5);
  transition:transform .15s ease;
}
.matched-marker:hover{transform:scale(1.15)}

.msg-badge{

}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}

:root{

  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}
/* Floating top search bar clears notch + left/right safe insets */
.otw-topbar{
  top:calc(14px + var(--sat))!important;
  left:calc(16px + var(--sal))!important;
  right:calc(16px + var(--sar))!important;
}
/* Edge-docked control stacks clear the right safe inset (landscape notch) */
.otw-edge{ right:calc(16px + var(--sar))!important; }
/* Persistent bottom nav clears the home indicator */
.otw-navbar{ margin-bottom:calc(20px + var(--sab))!important; }
/* Side drawer never wider than the viewport on tiny phones */
.otw-drawer{
  width:min(322px,86vw)!important;
  padding-top:var(--sat);
  padding-bottom:var(--sab);
  padding-left:var(--sal);
}
/* Bottom sheets never exceed the viewport (landscape safe) */
.otw-sheet{ max-height:calc(100dvh - 12px)!important; }
/* Full-screen views respect notches + home bar */
.otw-screen{
  padding-top:var(--sat);
  padding-bottom:var(--sab);
  padding-left:var(--sal);
  padding-right:var(--sar);
}

/* Cap the app at tablet width — on desktop it stays a centered tablet-style
   surface on the backdrop, never a stretched desktop web layout. */
html[data-theme="light"] .otw-sheet{ border-color:rgba(18,22,30,.10)!important; }

  },
  toggle() { this.set(this.mode === 'dark' ? 'light' : 'dark'); },

};

const haversineKm = (a, b) => {
  if (!a || !b) return Infinity;
  const R = 6371, toRad = x => x*Math.PI/180;
  const dLat = toRad(b[0]-a[0]), dLng = toRad(b[1]-a[1]);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a[0]))*Math.cos(toRad(b[0]))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
};

// ── MOCK "SERVER": marshrut bir marta chiziladi, keyin keshlanib qaytadi ──
const RouteServer = (() => {
  const cache = new Map(); // walkerId -> { coords, distanceKm, durationMin }
  const build = async (from, to) => {
    const routes = await getRoute([from, to]);
    const r = routes && routes[0];
    if (r && r.geometry) {
      return {
        coords: r.geometry.coordinates.map(c => [c[1], c[0]]),
        distanceKm: r.distance/1000, durationMin: r.duration/60,
      };
    }
    // OSRM ishlamasa — to'g'ri chiziq (fallback)
    return { coords: [from, to], distanceKm: haversineKm(from,to), durationMin: haversineKm(from,to)/0.4 };
  };
  return {
    // Walker sayohat qo'shganda marshrutni bir marta hisoblab serverda saqlash
    async save(id, from, to) {
      if (!cache.has(id)) cache.set(id, await build(from, to));
      return cache.get(id);
    },
    // Filtrlab topilgan walkerni ko'rmoqchi bo'lganda serverdan yuklash
    async fetch(walker) {
      if (cache.has(walker.id)) { await sleep(260); return cache.get(walker.id); }
      const data = await build(walker.fromLatlng, walker.toLatlng);
      cache.set(walker.id, data);
      return data;
    },
  };
})();

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">

      font-family="DM Sans,sans-serif" fill="${color}">${label}</text>
  </svg>`;
  return L.divIcon({
    html: svg, className:'', iconSize:[32,40], iconAnchor:[16,40], popupAnchor:[0,-40],
  });
}

  }
  if (L.Polyline && L.Polyline.AntPath) {
    return new L.Polyline.AntPath(latlngs, opts);
  }
  return L.polyline(latlngs, {
    color: opts.color, weight: opts.weight, opacity: opts.opacity, dashArray: '10 14',
  });
}

// ── Geocoding via Nominatim ─────────────────────────────────────
async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&accept-language=uz,ru,en`;
  try {
    const r = await fetch(url, { headers:{ 'Accept-Language':'uz,ru,en' } });
    return await r.json();
  } catch { return []; }
}

// Teskari geokodlash: koordinatadan matn manzil
async function reverseGeocode(latlng) {
  let label = `${latlng[0].toFixed(4)}, ${latlng[1].toFixed(4)}`;
  const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng[0]}&lon=${latlng[1]}&accept-language=uz,ru,en`;
  try {
    const r = await fetch(url, { headers:{ 'Accept-Language':'uz,ru,en' } });
    const d = await r.json();
    if (d.display_name) label = d.display_name.split(',').slice(0,3).join(', ');
  } catch {}
  return label;
}

// ── OSRM Routing ───────────────────────────────────────────────
async function getRoute(coords) {
  const coordStr = coords.map(c => `${c[1]},${c[0]}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson&alternatives=2`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    return d.routes || [];
  } catch { return []; }
}

// ── MAP HOOK ───────────────────────────────────────────────────
function useMap(containerRef, active) {
  const mapRef = useRef(null);
  const tileRef = useRef(null);
  const rendererRef = useRef(null); // umumiy padding'li SVG renderer (zoom paytida qirqilmaslik uchun)
  const zoomingRef = useRef(false); // map zoom animatsiyasi davom etyaptimi (tick'larni to'xtatish uchun)
  const layersRef = useRef({ routes:[], markers:L.layerGroup(), matched:L.layerGroup(), walkers:L.layerGroup(), userRoute:L.layerGroup(), preview:L.layerGroup() });
  const walkerLayersRef = useRef(new Map());
  const walkerBadgeRef = useRef({});
  const userMarkerRef = useRef(null);
  const userCircleRef = useRef(null);

  useEffect(() => {
    if (!active || !containerRef.current || mapRef.current) return;
    const map = L.map(containerRef.current, {
      center: TASHKENT, zoom: 14,
      zoomControl: false, attributionControl: false,
      // Kattaroq padding'li umumiy SVG renderer — zoom animatsiyasida chiziqlar
      //  viewport chetidan qirqilib "sakrab" qolmasligi uchun (clip bounds kengaytirildi).
      renderer: (rendererRef.current = L.svg({ padding: 2 })),
    });
    tileRef.current = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      subdomains:'abcd', maxZoom:19,
    }).addTo(map);
    layersRef.current.walkers.addTo(map);
    layersRef.current.userRoute.addTo(map);
    layersRef.current.preview.addTo(map);
    layersRef.current.markers.addTo(map);
    layersRef.current.matched.addTo(map);
    mapRef.current = map;
    // Zoom animatsiyasi paytida walker/route pozitsiyalarini yangilamaymiz —
    //  aks holda setLatLngs zoom transform bilan urishib chiziqlar "sakraydi".
    map.on('zoomstart', () => { zoomingRef.current = true; });
    map.on('zoomend', () => { zoomingRef.current = false; });
    return () => { map.remove(); mapRef.current = null; tileRef.current = null; userMarkerRef.current = null; userCircleRef.current = null; };
  }, [active]);

  const setMapStyle = useCallback((styleId) => {
    const map = mapRef.current; if (!map) return;
    const style = (typeof MAP_STYLES !== 'undefined' ? MAP_STYLES : []).find(s => s.id === styleId);
    if (!style) return;
    if (tileRef.current) map.removeLayer(tileRef.current);
    const opts = { maxZoom:19 };
    if (style.subdomains) opts.subdomains = style.subdomains;
    tileRef.current = L.tileLayer(style.url, opts).addTo(map);
    tileRef.current.bringToBack();
  }, []);

  const flyTo = useCallback((latlng, zoom=16) => {
    mapRef.current?.flyTo(latlng, zoom, { duration:0.8 });
  }, []);

  const setRouteLines = useCallback((routes, primaryIdx=0) => {
    if (!mapRef.current) return;
    layersRef.current.routes.forEach(l => mapRef.current.removeLayer(l));
    layersRef.current.routes = [];
    routes.forEach((rt, i) => {
      const coords = rt.geometry.coordinates.map(c => [c[1],c[0]]);
      const line = L.polyline(coords, {
        color: i===primaryIdx ? T.teal : 'rgba(255,255,255,0.3)',
        weight: i===primaryIdx ? 5 : 3,
        opacity: 1,
        dashArray: i===primaryIdx ? null : '8 6',
      }).addTo(mapRef.current);
      layersRef.current.routes.push(line);
    });
    if (routes.length > 0) {
      const coords = routes[0].geometry.coordinates.map(c => [c[1],c[0]]);
      mapRef.current.fitBounds(L.latLngBounds(coords), { padding:[60,60] });
    }
  }, []);

  const setWaypointMarkers = useCallback((points) => {
    if (!mapRef.current) return;
    layersRef.current.markers.clearLayers();
    points.forEach((p,i) => {
      if (!p.latlng) return;
      const icon = makeMarkerIcon(i===0 ? T.teal : T.red, i===0?'A':'B');
      L.marker(p.latlng, {icon}).addTo(layersRef.current.markers);
    });
    // User dot
    L.marker(TASHKENT, { icon:makeUserDot() }).addTo(layersRef.current.markers);
  }, []);

  const showMatchedUsers = useCallback((users, onSelect) => {
    if (!mapRef.current) return;
    layersRef.current.matched.clearLayers();
    users.forEach(u => {
      const color = u.type==='driver' ? T.amber : T.purple;
      const icon = makeMatchedIcon(color, u.initials);
      L.marker(u.latlng, {icon}).addTo(layersRef.current.matched)
        .on('click', () => onSelect(u));
    });
  }, []);

  const clearMatched = useCallback(() => {
    layersRef.current.matched.clearLayers();
  }, []);

  // ── WALKER SIMULATION RENDERING ──────────────────────────────
  // Joriy lokatsiya nuqtasi (foydalanuvchi)
  const setUserLocation = useCallback((latlng, heading) => {
    const map = mapRef.current; if (!map || !latlng) return;
    // Aniqlik radiusi doirasi
    if (userCircleRef.current) userCircleRef.current.setLatLng(latlng);
    else userCircleRef.current = L.circle(latlng, {
      radius: 35, color: T.teal, weight: 1.5, opacity: 0.5,
      fillColor: T.teal, fillOpacity: 0.12,
    }).addTo(map);
    // "Siz" markeri (eng ustda)
    if (userMarkerRef.current) userMarkerRef.current.setLatLng(latlng);
    else userMarkerRef.current = L.marker(latlng, { icon: makeMeIcon(), zIndexOffset: 1500 }).addTo(map);
    // Yo'nalish bo'yicha arrow uchini burish
    if (heading != null && userMarkerRef.current._icon) {
      const arrow = userMarkerRef.current._icon.querySelector('.me-arrow');
      if (arrow) arrow.style.transform = 'rotate(' + heading + 'deg)';
    }
  }, []);

  // Walkerlarni (start, manzil, bosib o'tilgan kulrang chiziq, qolgan ant-path, avatar) chizish
  const renderWalkers = useCallback((walkers, mode, onSelect) => {
    const map = mapRef.current; if (!map) return;
    layersRef.current.walkers.clearLayers();
    const lm = new Map();
    const theme = themeFor(mode);
    const grp = layersRef.current.walkers;
    walkers.forEach((w) => {
      const remaining = (w._remaining && w._remaining.length > 1) ? w._remaining : w.route;
      const traveled = w._traveled || [];
      // Qolgan qism — rangli ant-path (o'rmalovchi shtrixlar)
      const ant = makeAntPath(remaining, {
        delay: 10400, dashArray: [10, 22], weight: 5,
        color: w.color, pulseColor: theme.pulse, opacity: 0.95, lineCap: 'round',
        renderer: rendererRef.current,
      });
      ant.addTo(grp);
      // Bosib o'tilgan qism — rangsiz/kulrang
      const trav = L.polyline(traveled, {
        color: theme.traveled, weight: 5, opacity: 0.9, lineCap: 'round',
      }).addTo(grp);
      // Start + manzil markerlari
      const startMk = L.marker(w.route[0], { icon: makeStartIcon(w.color, theme) }).addTo(grp);
      const destMk = L.marker(w.route[w.route.length - 1], { icon: makeDestIcon(w.color, theme) }).addTo(grp);
      // Harakatlanuvchi avatar
      const mk = L.marker(w.position || w.route[0], {
        icon: makeWalkerIcon(w.color, w.initials), zIndexOffset: 600,
      }).addTo(grp);
      mk.on('click', () => onSelect && onSelect(w.id));
      lm.set(w.id, { ant, trav, mk, start: startMk, dest: destMk });
    });
    walkerLayersRef.current = lm;
    applyWalkerBadges(); // re-render qilinganda o'qilmagan badge'lar qayta qo'yiladi
  }, []);

  // Walker ikonkasidagi o'qilmagan xabar badge'ini yangilash (DOM)
  const applyWalkerBadges = useCallback(() => {
    const lm = walkerLayersRef.current; if (!lm) return;
    const counts = walkerBadgeRef.current || {};
    lm.forEach((layer, id) => {
      const iconEl = layer.mk && layer.mk._icon; if (!iconEl) return;
      const n = counts[id] || 0;
      let b = iconEl.querySelector('.msg-badge');
      if (n > 0) {
        if (!b) { b = document.createElement('div'); b.className = 'msg-badge'; iconEl.appendChild(b); }
        b.textContent = n > 9 ? '9+' : String(n);
      } else if (b) { b.remove(); }
    });
  }, []);
  const setWalkerBadges = useCallback((map) => {
    walkerBadgeRef.current = map || {};
    applyWalkerBadges();
  }, [applyWalkerBadges]);

  // Har tick: qatlamlarni qayta yaratmasdan yangilash (ant animatsiyasi uzilmaydi)
  const tickWalkers = useCallback((walkers) => {
    const lm = walkerLayersRef.current; if (!lm) return;
    if (zoomingRef.current) return; // zoom davom etayotganda chiziqlarni qayta proyeksiya qilmaymiz
    walkers.forEach((w) => {
      const layer = lm.get(w.id); if (!layer) return;
      if (w._remaining && w._remaining.length > 1 && layer.ant.setLatLngs) layer.ant.setLatLngs(w._remaining);
      if (w._traveled && layer.trav.setLatLngs) layer.trav.setLatLngs(w._traveled);
      if (w.position) layer.mk.setLatLng(w.position);
    });
    applyWalkerBadges(); // pozitsiya yangilanganda badge saqlanib qoladi
  }, [applyWalkerBadges]);

  const clearWalkers = useCallback(() => {
    layersRef.current.walkers.clearLayers();
    walkerLayersRef.current = new Map();
    if (mapRef.current) {
      if (userMarkerRef.current) { mapRef.current.removeLayer(userMarkerRef.current); userMarkerRef.current = null; }
      if (userCircleRef.current) { mapRef.current.removeLayer(userCircleRef.current); userCircleRef.current = null; }
    }
  }, []);

  const fitWalkers = useCallback((userLoc, walkers) => {
    const map = mapRef.current; if (!map) return;
    const pts = [];
    if (userLoc) pts.push(userLoc);
    walkers.forEach((w) => { pts.push(w.route[0]); });
    if (pts.length > 0) map.fitBounds(L.latLngBounds(pts), { padding:[72,72], maxZoom:15 });
  }, []);

  // Walkerlarni "disabled" (xira) holatga keltirish — marshrut qurish paytida
  const setWalkersDimmed = useCallback((dim) => {
    const lm = walkerLayersRef.current; if (!lm) return;
    lm.forEach((layer) => {
      if (layer.ant && layer.ant.setStyle) layer.ant.setStyle({ opacity: dim ? 0.15 : 0.95 });
      if (layer.trav && layer.trav.setStyle) layer.trav.setStyle({ opacity: dim ? 0.1 : 0.9 });
      if (layer.mk && layer.mk.setOpacity) layer.mk.setOpacity(dim ? 0.28 : 1);
      if (layer.start && layer.start.setOpacity) layer.start.setOpacity(dim ? 0.28 : 1);
      if (layer.dest && layer.dest.setOpacity) layer.dest.setOpacity(dim ? 0.28 : 1);
    });
  }, []);

  // Bitta walkerni ajratib ko'rsatish — tanlanganini to'liq, qolganlarini xira qiladi.
  //  id=null bo'lsa hammasini normal holatga qaytaradi. Tanlangan ant-path ustiga chiqadi.
  const highlightWalker = useCallback((id) => {
    const lm = walkerLayersRef.current; if (!lm) return;
    const has = id != null && lm.has(id);
    lm.forEach((layer, wid) => {
      const on = !has || wid === id; // tanlov bo'lmasa yoki shu walker tanlangan bo'lsa — to'liq
      if (layer.ant && layer.ant.setStyle) layer.ant.setStyle({ opacity: on ? 0.95 : 0.12 });
      if (layer.trav && layer.trav.setStyle) layer.trav.setStyle({ opacity: on ? 0.9 : 0.08 });
      if (layer.mk && layer.mk.setOpacity) layer.mk.setOpacity(on ? 1 : 0.3);
      if (layer.start && layer.start.setOpacity) layer.start.setOpacity(on ? 1 : 0.25);
      if (layer.dest && layer.dest.setOpacity) layer.dest.setOpacity(on ? 1 : 0.25);
    });
    // Tanlangan walkerning chiziq + markerlarini eng ustiga olib chiqamiz
    if (has) {
      const layer = lm.get(id);
      if (layer.trav && layer.trav.bringToFront) layer.trav.bringToFront();
      if (layer.ant && layer.ant.bringToFront) layer.ant.bringToFront();
      if (layer.mk && layer.mk.setZIndexOffset) layer.mk.setZIndexOffset(1200);
    }
  }, []);
  const getCenter = useCallback(() => {
    const m = mapRef.current; if (!m) return null;
    const c = m.getCenter(); return [c.lat, c.lng];
  }, []);
  const onMove = useCallback((cb) => {
    const m = mapRef.current; if (!m) return () => {};
    m.on('move', cb); return () => m.off('move', cb);
  }, []);
  const onMoveEnd = useCallback((cb) => {
    const m = mapRef.current; if (!m) return () => {};
    m.on('moveend', cb); return () => m.off('moveend', cb);
  }, []);

  // ── APP-OWNER (foydalanuvchi) MARSHRUTI — SOLID, bosib o'tilgani rangsiz ──
  const userRouteRef = useRef({ trav: null, rem: null });
  const renderUserRoute = useCallback((coords, mode) => {
    const map = mapRef.current; if (!map || !coords || coords.length < 2) return;
    layersRef.current.userRoute.clearLayers();
    const theme = themeFor(mode);
    // Halo/glow underlay — keng yarim-shaffof teal (Yandex uslubidagi yorqin soya)
    const glow = L.polyline(coords, {
      color: T.teal, weight: 17, opacity: 0.20, lineCap: 'round', lineJoin: 'round',
      className: 'owner-route-glow', interactive: false,
    }).addTo(layersRef.current.userRoute);
    // Qolgan qism — rangli SOLID, qalin + yorqin (walkerlarникidan ajralib turadi)
    const rem = L.polyline(coords, {
      color: T.teal, weight: 9, opacity: 1, lineCap: 'round', lineJoin: 'round',
      className: 'owner-route-main',
    }).addTo(layersRef.current.userRoute);
    // Bosib o'tilgan qism — rangsiz/kulrang SOLID
    const trav = L.polyline([], {
      color: theme.traveled, weight: 9, opacity: 0.95, lineCap: 'round', lineJoin: 'round',
    }).addTo(layersRef.current.userRoute);
    userRouteRef.current = { trav, rem, glow };
  }, []);
  const updateUserRoute = useCallback((traveled, remaining) => {
    const r = userRouteRef.current; if (!r) return;
    if (zoomingRef.current) return; // zoom paytida qayta proyeksiya qilmaymiz (sakrashning oldini olish)
    if (r.trav && traveled) r.trav.setLatLngs(traveled);
    if (r.rem && remaining) r.rem.setLatLngs(remaining);
    if (r.glow && remaining) r.glow.setLatLngs(remaining);
  }, []);
  // Map stili o'zgarganda owner marshrutining bosib o'tilgan qismini qayta ranglash
  //  (walkerlar renderWalkers orqali yangilanadi; owner uchun alohida kerak).
  const recolorUserRoute = useCallback((mode) => {
    const r = userRouteRef.current; if (!r || !r.trav) return;
    const theme = themeFor(mode);
    if (r.trav.setStyle) r.trav.setStyle({ color: theme.traveled });
  }, []);
  const clearUserRoute = useCallback(() => {
    layersRef.current.userRoute.clearLayers();
    userRouteRef.current = { trav: null, rem: null, glow: null };
  }, []);
  // ── WALKER MARSHRUT PREVIEW (serverdan kelgan tayyor route) ──
  const showPreviewRoute = useCallback((coords) => {
    const map = mapRef.current; if (!map || !coords || coords.length < 2) return;
    layersRef.current.preview.clearLayers();
    const grp = layersRef.current.preview;
    // Halo + asosiy chiziq (app-owner uslubidagidek yorqin)
    L.polyline(coords, { color: T.teal, weight: 16, opacity: 0.18, lineCap:'round',
      className:'owner-route-glow', interactive:false }).addTo(grp);
    L.polyline(coords, { color: T.teal, weight: 7, opacity: 1, lineCap:'round', lineJoin:'round',
      className:'owner-route-main' }).addTo(grp);
    // Boshlanish / manzil markerlari
    L.marker(coords[0], { icon: makeMarkerIcon(T.green, 'A') }).addTo(grp);
    L.marker(coords[coords.length-1], { icon: makeMarkerIcon(T.red, 'B') }).addTo(grp);
    map.fitBounds(L.latLngBounds(coords), { padding:[80,110], maxZoom:15 });
  }, []);
  const clearPreviewRoute = useCallback(() => {
    layersRef.current.preview.clearLayers();
  }, []);
  // Marshrut rejalashtirish izlari (A/B markerlar + muqobil chiziqlar) ni tozalash
  const clearPlanning = useCallback(() => {
    layersRef.current.markers.clearLayers();
    if (mapRef.current) layersRef.current.routes.forEach((l) => mapRef.current.removeLayer(l));
    layersRef.current.routes = [];
  }, []);
  const fitRoute = useCallback((coords) => {
    const map = mapRef.current; if (!map || !coords || !coords.length) return;
    map.fitBounds(L.latLngBounds(coords), { padding:[70,96], maxZoom:15 });
  }, []);

  // ── KONTAKT FOKUS: boshqa walkerlarni butunlay yashirish ──
  const hideWalkers = useCallback((hide) => {
    const lm = walkerLayersRef.current; if (!lm) return;
    lm.forEach((layer) => {
      if (layer.ant && layer.ant.setStyle) layer.ant.setStyle({ opacity: hide ? 0 : 0.95 });
      if (layer.trav && layer.trav.setStyle) layer.trav.setStyle({ opacity: hide ? 0 : 0.9 });
      if (layer.mk && layer.mk.setOpacity) layer.mk.setOpacity(hide ? 0 : 1);
      if (layer.start && layer.start.setOpacity) layer.start.setOpacity(hide ? 0 : 1);
      if (layer.dest && layer.dest.setOpacity) layer.dest.setOpacity(hide ? 0 : 1);
    });
  }, []);
  // Tanlangan kontaktni xaritada ko'rsatish (marshruti bo'lsa — chizadi)
  const showContactFocus = useCallback((contact) => {
    const map = mapRef.current; if (!map) return;
    layersRef.current.preview.clearLayers();
    const grp = layersRef.current.preview;
    const theme = themeFor('dark');
    const color = contact.color || (contact.type === 'driver' ? T.amber : T.purple);
    if (contact.route && contact.route.length > 1) {
      // Walkerlar bilan bir xil — o'rmalovchi ant-path
      const ant = makeAntPath(contact.route, {
        delay: 10400, dashArray: [10, 22], weight: 5,
        color, pulseColor: theme.pulse, opacity: 0.95, lineCap: 'round',
        renderer: rendererRef.current,
      });
      ant.addTo(grp);
      L.marker(contact.route[0], { icon: makeStartIcon(color, theme) }).addTo(grp);
      L.marker(contact.route[contact.route.length-1], { icon: makeDestIcon(color, theme) }).addTo(grp);
    }
    if (contact.latlng) {
      L.marker(contact.latlng, { icon: makeWalkerIcon(color, contact.initials), zIndexOffset: 800 }).addTo(grp);
    }
  }, []);
  const fitPoints = useCallback((pts) => {
    const map = mapRef.current; if (!map || !pts || !pts.length) return;
    map.fitBounds(L.latLngBounds(pts), { padding:[96,110], maxZoom:15 });
  }, []);

  // tap-to-pick: enable/disable map click for waypoint selection
  const tapPickRef = useRef(null);
  const enableTapPick = useCallback((onPick) => {
    if (!mapRef.current) return;
    mapRef.current.getContainer().style.cursor = 'crosshair';
    const handler = (e) => {
      onPick([e.latlng.lat, e.latlng.lng]);
      mapRef.current.getContainer().style.cursor = '';
      mapRef.current.off('click', handler);
      tapPickRef.current = null;
    };
    tapPickRef.current = handler;
    mapRef.current.on('click', handler);
  }, []);

  const disableTapPick = useCallback(() => {
    if (!mapRef.current || !tapPickRef.current) return;
    mapRef.current.off('click', tapPickRef.current);
    mapRef.current.getContainer().style.cursor = '';
    tapPickRef.current = null;
  }, []);

  // driver tracking simulation
  const trackingRef = useRef(null);
  const startTracking = useCallback((startLatlng, endLatlng, onUpdate) => {
    if (trackingRef.current) clearInterval(trackingRef.current);
    let t = 0;
    const steps = 60;
    const icon = makeMatchedIcon(T.amber, 'AK');
    const marker = L.marker(startLatlng, { icon }).addTo(mapRef.current);
    trackingRef.current = setInterval(() => {
      t++;
      const frac = t / steps;
      const lat = startLatlng[0] + (endLatlng[0] - startLatlng[0]) * frac;
      const lng = startLatlng[1] + (endLatlng[1] - startLatlng[1]) * frac;
      marker.setLatLng([lat, lng]);
      onUpdate && onUpdate(frac);
      if (t >= steps) {
        clearInterval(trackingRef.current);
        trackingRef.current = null;
      }
    }, 400);
    return () => { clearInterval(trackingRef.current); marker.remove(); };
  }, []);

  return { mapRef, flyTo, setRouteLines, setWaypointMarkers, showMatchedUsers, clearMatched, enableTapPick, disableTapPick, startTracking, setMapStyle, setUserLocation, renderWalkers, tickWalkers, clearWalkers, fitWalkers, setWalkersDimmed, highlightWalker, setWalkerBadges, getCenter, onMove, onMoveEnd, renderUserRoute, updateUserRoute, clearUserRoute, recolorUserRoute, showPreviewRoute, clearPreviewRoute, fitRoute, clearPlanning, hideWalkers, showContactFocus, fitPoints };
}

// ── MAP OVERLAY UI ─────────────────────────────────────────────
function Speedometer() {
  const [cur, setCur] = useState(0);
  const [limit, setLimit] = useState(60);
  const curRef = useRef(0), targetRef = useRef(0), limitRef = useRef(60);

  // Tezlikni jonli simulyatsiya: maqsadli tezlikka silliq yaqinlashish + nozik shovqin.
  // Vaqti-vaqti bilan yoʻl segmenti (limit) va maqsadli tezlik almashadi.
  useEffect(() => {
    const LIMITS = [40, 50, 60, 70, 80];
    let segTick = 0, tgtTick = 0;
    const id = setInterval(() => {
      if (--segTick <= 0) {
        const nl = LIMITS[Math.floor(Math.random() * LIMITS.length)];
        limitRef.current = nl; setLimit(nl);
        segTick = 18 + Math.floor(Math.random() * 12);
      }
      if (--tgtTick <= 0) {
        const lim = limitRef.current;
        // ~35% segmentlarda haydovchi limitdan oshib ketadi (ogohlantirish ko'rinsin)
        if (Math.random() < 0.35) {
          targetRef.current = lim * (1.06 + Math.random() * 0.16); // 1.06–1.22 × limit
          tgtTick = 5 + Math.floor(Math.random() * 4);             // bir necha soniya ushlab turadi
        } else {
          targetRef.current = lim * (0.6 + Math.random() * 0.32);  // 0.60–0.92 × limit
          tgtTick = 3 + Math.floor(Math.random() * 4);
        }
      }
      let v = curRef.current + (targetRef.current - curRef.current) * 0.22 + (Math.random() - 0.5) * 1.4;
      v = Math.max(0, v);
      curRef.current = v; setCur(Math.round(v));
    }, 680);
    return () => clearInterval(id);
  }, []);

  const over = cur > limit;
  return (
    <div style={{position:'absolute',top:64,left:16,pointerEvents:'none',
      display:'flex',alignItems:'center',gap:8}}>
      {/* Joriy tezlik — ixcham (Yandex uslubi) */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',width:48,height:48,borderRadius:14,
        background: over ? T.red : 'rgba(20,23,28,.82)',
        backdropFilter:'blur(8px)',lineHeight:1,
        boxShadow:'0 2px 8px rgba(0,0,0,.35)',
        transition:'background .3s ease'}}>
        <span style={{fontSize:20,fontWeight:700,color:'#fff',
          fontVariantNumeric:'tabular-nums',letterSpacing:'-.5px'}}>{cur}</span>
        <span style={{fontSize:7.5,fontWeight:600,marginTop:1.5,letterSpacing:.2,
          textTransform:'uppercase',color:'rgba(255,255,255,.7)'}}>{t('speed.unit')}</span>
      </div>
      {/* Ruxsat etilgan tezlik belgisi */}
      <div style={{position:'relative',width:44,height:44}}>
        {over && <div style={{position:'absolute',inset:-3,borderRadius:'50%',
          border:`2px solid ${T.red}`,animation:'pulse 1s ease infinite'}}/>}
        <div style={{width:44,height:44,borderRadius:'50%',background:'#fff',
          border:'5px solid #e8403a',display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 2px 8px rgba(0,0,0,.35)'}}>
          <span style={{fontSize:17,fontWeight:800,color:'#16181d',
            fontVariantNumeric:'tabular-nums'}}>{limit}</span>
        </div>
      </div>
    </div>
  );
}

function LocationField({ label, point, placeholder, accent=T.teal, onPick, onSelect }) {
  const [query, setQuery] = useState(point ? point.label : '');
  const [suggestions, setSuggestions] = useState([]);
  const [searching, setSearching] = useState(false);
  const [focused, setFocused] = useState(false);
  const debRef = useRef(null);

  // Tashqaridan (xaritadan tanlanganda) point o'zgarsa — input matnini sinxronlash
  useEffect(() => { if (point) { setQuery(point.label); setSuggestions([]); } }, [point]);

  const onChange = (val) => {
    setQuery(val);
    if (point) onSelect(null);            // eski tanlovni bekor qilish
    clearTimeout(debRef.current);
    if (val.trim().length < 2) { setSuggestions([]); setSearching(false); return; }
    setSearching(true);
    debRef.current = setTimeout(async () => {
      const res = await geocode(val);
      setSuggestions(res.slice(0,5));
      setSearching(false);
    }, 400);
  };

  const pickSuggest = (s) => {
    const latlng = [parseFloat(s.lat), parseFloat(s.lon)];
    const lbl = s.display_name.split(',').slice(0,2).join(', ');
    setQuery(lbl); setSuggestions([]); setSearching(false); setFocused(false);
    onSelect({ latlng, label: lbl });
  };

  const clear = () => { setQuery(''); setSuggestions([]); setSearching(false); onSelect(null); };

  return (
    <div style={{marginBottom:12}}>
      <div style={FIELD_LABEL}>{label}</div>
      <div style={{position:'relative'}}>
        <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',
          width:8,height:8,borderRadius:4,background:accent,zIndex:1}}/>
        <input value={query}
          placeholder={placeholder}
          onChange={e=>onChange(e.target.value)}
          onFocus={()=>setFocused(true)}
          onBlur={()=>setTimeout(()=>setFocused(false),150)}
          style={{width:'100%',padding:'12px 76px 12px 28px',borderRadius:12,
            background:T.bg,border:`1.5px solid ${point?accent+'55':(focused?T.teal+'55':T.border)}`,
            color:T.text,fontSize:13,outline:'none',
            fontFamily:'DM Sans,sans-serif',transition:'border-color .18s ease'}}/>
        {/* Tozalash */}
        {query && (
          <button onClick={clear} style={{position:'absolute',right:42,top:'50%',
            transform:'translateY(-50%)',width:20,height:20,borderRadius:6,border:'none',
            background:'transparent',color:T.muted,cursor:'pointer',display:'flex',
            alignItems:'center',justifyContent:'center',fontSize:12}}>✕</button>
        )}
        {/* Xaritadan tanlash (marker) */}
        <button onClick={onPick} title={t('form.pickOnMap')}
          style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
            width:28,height:28,borderRadius:8,border:`1px solid ${accent}40`,cursor:'pointer',
            background:`${accent}14`,display:'flex',alignItems:'center',justifyContent:'center',
            transition:'background .15s ease'}}>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M8 1.5C5.2 1.5 3 3.7 3 6.5c0 3.5 5 8 5 8s5-4.5 5-8C13 3.7 10.8 1.5 8 1.5z" stroke={accent} strokeWidth="1.3"/>
            <circle cx="8" cy="6.5" r="1.7" fill={accent}/>
          </svg>
        </button>
      </div>

      {/* Qidiruv holati / takliflar */}
      {focused && searching && (
        <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8,padding:'2px 2px'}}>
          <div style={{width:14,height:14,borderRadius:7,border:`2px solid ${T.tealDim}`,
            borderTop:`2px solid ${T.teal}`,animation:'spin .7s linear infinite'}}/>
          <span style={{fontSize:12,color:T.muted}}>{t('form.searching')}</span>
        </div>
      )}
      {focused && !searching && suggestions.length>0 && (
        <div style={{marginTop:8,borderRadius:12,overflow:'hidden',border:`1px solid ${T.border}`}}>
          {suggestions.map((s,i)=>(
            <button key={i} onMouseDown={()=>pickSuggest(s)}
              style={{width:'100%',padding:'10px 12px',background:i%2===0?T.surface2:T.bg,
                border:'none',borderBottom:i<suggestions.length-1?`1px solid ${T.border}`:'none',
                display:'flex',alignItems:'center',gap:9,cursor:'pointer',textAlign:'left',
                fontFamily:'DM Sans,sans-serif'}}>
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style={{flexShrink:0}}>
                <path d="M7 1.3C4.9 1.3 3.2 3 3.2 5.1c0 2.6 3.8 6 3.8 6s3.8-3.4 3.8-6C10.8 3 9.1 1.3 7 1.3z" stroke={T.muted} strokeWidth="1.2"/>
                <circle cx="7" cy="5.1" r="1.3" fill={T.muted}/>

            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function TimeRangeSlider({ start, end, onChange, min=6, max=24 }) {
  const trackRef = useRef(null);
  const dragRef = useRef(null);
  const pct = v => ((v-min)/(max-min))*100;
  const valFromX = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    let p = (clientX - r.left)/r.width; p = Math.max(0,Math.min(1,p));
    return Math.round(min + p*(max-min));
  };
  useEffect(() => {
    const move = (e) => {
      if (!dragRef.current) return;
      const v = valFromX(e.clientX);
      if (dragRef.current==='s') onChange(Math.min(v,end-1), end);
      else onChange(start, Math.max(v,start+1));
    };
    const up = () => { dragRef.current = null; };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    return () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
  });
  const thumb = (which, v) => (
    <div onPointerDown={()=>{ dragRef.current=which; }} style={{
      position:'absolute',left:`${pct(v)}%`,top:'50%',transform:'translate(-50%,-50%)',
      width:22,height:22,borderRadius:11,background:'#fff',border:`3px solid ${T.teal}`,
      boxShadow:'0 2px 6px rgba(0,0,0,.4)',cursor:'grab',touchAction:'none',zIndex:2}}/>
  );
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:T.teal,fontVariantNumeric:'tabular-nums'}}>{hLabel(start)}</span>
        <span style={{fontSize:10,color:T.muted}}>{t('form.timeRange')}</span>
        <span style={{fontSize:13,fontWeight:700,color:T.teal,fontVariantNumeric:'tabular-nums'}}>{hLabel(end)}</span>
      </div>
      <div ref={trackRef} style={{position:'relative',height:22,margin:'0 8px'}}>
        <div style={{position:'absolute',top:'50%',left:0,right:0,height:4,marginTop:-2,borderRadius:2,background:T.surface2}}/>
        <div style={{position:'absolute',top:'50%',height:4,marginTop:-2,borderRadius:2,
          left:`${pct(start)}%`,width:`${pct(end)-pct(start)}%`,background:T.teal}}/>
        {thumb('s',start)}
        {thumb('e',end)}
      </div>
    </div>
  );
}

function WhenField({ date, onDate, tStart, tEnd, onTime }) {
  const dateOpts = [0,1,2].map(i => {
    const d=new Date(NOW); d.setDate(d.getDate()+i);
    const iso = d.toISOString().slice(0,10);
    return { iso, label: i===0?t('form.today'):i===1?t('form.tomorrow'):t('form.dayAfter') };
  });
  const presetIsos = dateOpts.map(d => d.iso);
  const customActive = date && !presetIsos.includes(date);
  const activePreset = TIME_PRESETS.find(p => p.s===tStart && p.e===tEnd);

  const UZ_MON=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  const UZ_MON_S=['yan','fev','mar','apr','may','iyun','iyul','avg','sen','okt','noy','dek'];
  const UZ_DOW=['Du','Se','Ch','Pa','Ju','Sh','Ya'];
  const todayIso = new Date(NOW).toISOString().slice(0,10);
  const [calOpen,setCalOpen]=useState(false);
  const initRef = (customActive ? new Date(date+'T00:00') : new Date(NOW));
  const [calYM,setCalYM]=useState({y:initRef.getFullYear(),m:initRef.getMonth()});
  const pad=(n)=>String(n).padStart(2,'0');
  const fmtIso=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
  const buildCells=(y,m)=>{
    const startDow=(new Date(y,m,1).getDay()+6)%7;
    const dim=new Date(y,m+1,0).getDate();
    const cells=[]; for(let i=0;i<startDow;i++)cells.push(null);
    for(let d=1;d<=dim;d++)cells.push(d); return cells;
  };
  const shiftMonth=(delta)=>setCalYM(({y,m})=>{ const nm=m+delta; return {y:y+Math.floor(nm/12),m:((nm%12)+12)%12}; });
  return (
    <div style={{marginBottom:14}}>
      <div style={FIELD_LABEL}>{t('form.when')}</div>
      <div style={{display:'flex',gap:6,paddingBottom:8}}>
        {dateOpts.map(d => {
          const on = date===d.iso;
          return (
            <button key={d.iso} onClick={()=>onDate(d.iso)} style={{
              flex:1,padding:'8px 0',borderRadius:12,cursor:'pointer',
              border:`1px solid ${on?T.amber+'60':T.border}`,
              background:on?'rgba(240,168,50,0.14)':'transparent',
              color:on?T.amber:T.muted,fontSize:12,fontWeight:on?600:400,
              fontFamily:'DM Sans,sans-serif',whiteSpace:'nowrap'}}>{d.label}</button>
          );
        })}
        <div style={{flex:1,position:'relative'}}>
          <button onClick={()=>{
              if(!calOpen && customActive){ const d=new Date(date+'T00:00'); setCalYM({y:d.getFullYear(),m:d.getMonth()}); }
              setCalOpen(o=>!o);
            }} style={{
            width:'100%',display:'flex',alignItems:'center',justifyContent:'center',
            gap:5,padding:'8px 0',borderRadius:12,cursor:'pointer',
            border:`1px solid ${customActive||calOpen?T.amber+'60':T.border}`,
            background:customActive||calOpen?'rgba(240,168,50,0.14)':'transparent',
            fontFamily:'DM Sans,sans-serif'}}>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style={{flexShrink:0}}>
              <rect x="2.5" y="3" width="11" height="11" rx="2" stroke={customActive||calOpen?T.amber:T.muted} strokeWidth="1.4"/>
              <path d="M2.5 6.5h11M5.5 1.8v2.2M10.5 1.8v2.2" stroke={customActive||calOpen?T.amber:T.muted} strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
            <span style={{fontSize:12,fontWeight:customActive?600:400,color:customActive||calOpen?T.amber:T.muted,
              whiteSpace:'nowrap'}}>
              {customActive ? (()=>{ const d=new Date(date+'T00:00'); return `${d.getDate()}-${UZ_MON_S[d.getMonth()]}`; })() : t('form.other')}
            </span>
          </button>
        </div>
      </div>

      {calOpen && (
        <div style={{marginBottom:12,
          background:T.hover,border:`1px solid ${T.border}`,borderRadius:16,
          padding:'12px 12px 10px',animation:'fadeUp .16s ease both'}}>
          {/* Month header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <button onClick={()=>shiftMonth(-1)} style={{width:30,height:30,borderRadius:9,
              border:`1px solid ${T.border}`,background:'transparent',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6l4 4" stroke={T.muted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <span style={{fontSize:13,fontWeight:600,color:T.text}}>{UZ_MON[calYM.m]} {calYM.y}</span>
            <button onClick={()=>shiftMonth(1)} style={{width:30,height:30,borderRadius:9,
              border:`1px solid ${T.border}`,background:'transparent',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2l4 4-4 4" stroke={T.muted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
          {/* Day-of-week row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:5}}>
            {UZ_DOW.map((w,i)=>(
              <div key={w} style={{textAlign:'center',fontSize:10,fontWeight:600,
                color:i>=5?T.red+'99':T.muted,padding:'2px 0'}}>{w}</div>
            ))}
          </div>
          {/* Day grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
            {buildCells(calYM.y,calYM.m).map((d,i)=>{
              if(d===null) return <div key={'e'+i}/>;
              const iso=fmtIso(calYM.y,calYM.m,d);
              const sel=date===iso; const isToday=iso===todayIso; const past=iso<todayIso;
              return (
                <button key={iso} disabled={past} onClick={()=>{ onDate(iso); setCalOpen(false); }} style={{
                  height:34,borderRadius:9,cursor:past?'default':'pointer',
                  border:isToday&&!sel?`1px solid ${T.amber}66`:'1px solid transparent',
                  background:sel?T.amber:'transparent',
                  color:sel?'#1a1205':past?T.muted+'44':T.text,
                  fontSize:13,fontWeight:sel?700:isToday?600:400,
                  fontFamily:'DM Sans,sans-serif',transition:'background .12s ease'}}>{d}</button>
              );
            })}
          </div>
        </div>
      )}
      <div style={{display:'flex',gap:6,margin:'2px 0 12px'}}>
        {TIME_PRESETS.map(p => {
          const on = activePreset && activePreset.id===p.id;
          return (
            <button key={p.id} onClick={()=>onTime(p.s,p.e)} style={{
              flex:1,padding:'7px 0',borderRadius:9,cursor:'pointer',
              border:`1px solid ${on?T.purple+'60':T.border}`,
              background:on?'rgba(167,139,250,0.14)':'transparent',
              color:on?T.purple:T.muted,fontSize:11,fontWeight:on?600:400,
              fontFamily:'DM Sans,sans-serif'}}>{t('form.preset'+p.id.charAt(0).toUpperCase()+p.id.slice(1))}</button>
          );
        })}
      </div>
      <TimeRangeSlider start={tStart} end={tEnd} onChange={onTime}/>
    </div>
  );
}

    from:null, to:null, date:todayIso, tStart:8, tEnd:10, seats:'1', note:'',
  });
  const [submitted, setSubmitted] = useState(false);

  const center = userLoc || TASHKENT;
  const nearest = [...WALKERS_DATA]
    .sort((a,b)=>haversineKm(center,a.fromLatlng)-haversineKm(center,b.fromLatlng))
    .slice(0,10);

  const matchWalkers = () => WALKERS_DATA.filter(w => {
    if (filters.type!=='all' && w.type!==filters.type) return false;
    if (filters.from && haversineKm(w.fromLatlng, filters.from.latlng) > 4) return false;
    if (filters.to && haversineKm(w.toLatlng, filters.to.latlng) > 4) return false;
    const h = w.when.getHours() + w.when.getMinutes()/60;
    if (h < filters.tStart || h > filters.tEnd) return false;
    if (filters.type==='driver' && filters.seats!=='any' && w.seats < Number(filters.seats)) return false;
    return true;
  }).sort((a,b)=>haversineKm(center,a.fromLatlng)-haversineKm(center,b.fromLatlng));

  const runSearch = () => { setResults(matchWalkers()); setSearched(true); };
  const resetSearch = () => { setFilters(EMPTY); setSearched(false); setResults([]); };
  const list = searched ? results : nearest;

  // Manzilni xaritadan tanlash (panel minimallashadi, tasdiqlangach qaytadi)
  const openPick = (slot, target, cur) => onMapTask({
    type:'pick',
    label: slot==='from' ? t('pickField.from') : t('pickField.to'),
    current: cur ? cur.latlng : null,
    onDone: (point) => target==='filter'
      ? setFilters(f=>({...f,[slot]:point}))
      : setForm(f=>({...f,[slot]:point})),
  });

  // Sayohatni tizimga qo'shish — marshrut serverda bir marta saqlanadi
  const submitTrip = async () => {
    const id = 'me_'+Date.now();
    RouteServer.save(id, form.from.latlng, form.to.latlng);
    setSubmitted(true);
  };

  const addValid = form.from && form.to && form.date;
  const walkerLabel = mode==='driver' ? t('common.passenger') : t('common.driver');

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',minHeight:0,overflow:'hidden'}}>
      {/* Sub-tabs */}
      <div style={{display:'flex',gap:0,margin:'12px 16px 0',background:T.bg,
        borderRadius:12,padding:3,border:`1px solid ${T.border}`,flexShrink:0}}>
        {[{id:'search',label:t('schedule.tabSearch',{role:walkerLabel})},{id:'add',label:t('schedule.tabAdd')}].map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:'9px 0',borderRadius:10,border:'none',cursor:'pointer',
            background: tab===t.id?T.teal:'transparent',color: tab===t.id?'white':T.muted,
            fontSize:12,fontWeight:tab===t.id?600:400,transition:'all .2s ease',
            fontFamily:'DM Sans,sans-serif'}}>{t.label}</button>
        ))}
      </div>

      {/* ── SEARCH TAB ── */}
      {tab==='search' && (
        <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* Filtr — tepada fikslangan */}
          <div style={{flexShrink:0,padding:'14px 16px 12px',overflowY:'auto',maxHeight:'320px',
            borderBottom:`1px solid ${T.border}`}}>
          <div style={{marginBottom:6}}>
            <div style={FIELD_LABEL}>{t('schedule.walkerType')}</div>
            <div style={{marginBottom:14}}>
              <Segmented value={filters.type} onChange={v=>setFilters(f=>({...f,type:v}))}
                options={[{id:'all',label:t('schedule.typeAll')},{id:'driver',label:'🚗 '+t('schedule.typeDriver')},{id:'passenger',label:'🧑‍✈️ '+t('schedule.typePassenger')}]}/>
            </div>
            <LocationField label={t('form.from')} point={filters.from} accent={T.teal}
              placeholder={t('form.addrPlaceholder')}
              onSelect={p=>setFilters(f=>({...f,from:p}))}
              onPick={()=>openPick('from','filter',filters.from)}/>
            <LocationField label={t('form.to')} point={filters.to} accent={T.red}
              placeholder={t('form.addrPlaceholder')}
              onSelect={p=>setFilters(f=>({...f,to:p}))}
              onPick={()=>openPick('to','filter',filters.to)}/>
            <WhenField date={filters.date} onDate={v=>setFilters(f=>({...f,date:v}))}
              tStart={filters.tStart} tEnd={filters.tEnd}
              onTime={(s,e)=>setFilters(f=>({...f,tStart:s,tEnd:e}))}/>
            {filters.type==='driver' && (
              <SeatsField includeAny value={filters.seats} onChange={v=>setFilters(f=>({...f,seats:v}))}/>
            )}
            <div style={{display:'flex',gap:8,marginTop:4,marginBottom:14}}>
              {searched && (
                <button onClick={resetSearch} style={{padding:'13px 16px',borderRadius:13,
                  border:`1px solid ${T.border}`,background:'transparent',color:T.muted,
                  fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                  {t('common.clear')}
                </button>
              )}
              <button onClick={runSearch} style={{flex:1,padding:'13px',borderRadius:13,border:'none',
                background:`linear-gradient(135deg,${T.teal},#0e9e97)`,color:'white',
                fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif',
                boxShadow:`0 4px 18px ${T.tealGlow}`,display:'flex',alignItems:'center',
                justifyContent:'center',gap:8}}>
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                  <circle cx="7" cy="7" r="5" stroke="white" strokeWidth="1.8"/>
                  <path d="M11 11L14 14" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
                {t('schedule.find')}
              </button>
            </div>
          </div>

          {/* Shu filtr bo'yicha sayohat qo'shish */}
          <button onClick={()=>setTab('add')} style={{width:'100%',padding:'11px 14px',borderRadius:12,
            border:`1px dashed ${T.teal}45`,background:T.tealDim,display:'flex',alignItems:'center',
            gap:8,cursor:'pointer',fontFamily:'DM Sans,sans-serif',marginBottom:14}}>
            <span style={{fontSize:17,color:T.teal,lineHeight:1}}>+</span>
            <span style={{fontSize:12,color:T.teal,fontWeight:600}}>{t('schedule.addOwnTrip')}</span>
          </button>
          </div>

          {/* Ro'yxat — alohida scroll (swipable) */}
          <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'12px 16px 16px'}}>
          {/* Ro'yxat sarlavhasi */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:700,color:T.muted,textTransform:'uppercase',letterSpacing:.6}}>
              {searched ? t('schedule.resultsCount',{n:list.length}) : t('schedule.nearest')}
            </span>
            {!searched && <span style={{fontSize:10,color:T.muted}}>{t('schedule.byLocation')}</span>}
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {list.length===0 ? (
              <div style={{padding:'30px 20px',textAlign:'center',color:T.muted,fontSize:13,lineHeight:1.6}}>
                {t('schedule.noResults')}<br/>{t('schedule.noResultsSub')}
              </div>
            ) : list.map((w,i) => (
              <WalkerCard key={w.id} walker={w} idx={i} dist={haversineKm(center,w.fromLatlng)}
                onSelect={()=>onMapTask({ type:'preview', walker:w })}/>
            ))}
          </div>
          </div>
        </div>
      )}

      {/* ── ADD TRIP TAB ── */}
      {tab==='add' && (
        <div style={{flex:1,overflowY:'auto',padding:'14px 16px 24px'}}>
          {submitted ? (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',
              justifyContent:'center',padding:'40px 20px',gap:14,textAlign:'center'}}>
              <div style={{width:56,height:56,borderRadius:20,background:T.tealDim,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>✅</div>
              <div style={{fontSize:17,fontWeight:600,color:T.text}}>{t('schedule.addedTitle')}</div>
              <div style={{fontSize:13,color:T.muted,lineHeight:1.6}}>
                {t('schedule.addedBody')}
              </div>
              <div style={{display:'flex',gap:8,marginTop:8}}>
                <button onClick={()=>{ setSubmitted(false); setTab('search'); }}
                  style={{padding:'11px 18px',borderRadius:12,border:`1px solid ${T.border}`,
                    background:'transparent',color:T.muted,fontSize:13,fontWeight:600,
                    cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                  {t('schedule.toList')}
                </button>
                <button onClick={()=>setSubmitted(false)}
                  style={{padding:'11px 22px',borderRadius:12,border:`1px solid ${T.teal}40`,
                    background:T.tealDim,color:T.teal,fontSize:13,fontWeight:600,
                    cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                  {t('schedule.addMore')}
                </button>
              </div>
            </div>
          ) : (
            <>
              <div style={{marginBottom:14}}>
                <div style={FIELD_LABEL}>{t('schedule.iAm')}</div>
                <Segmented value={form.type} onChange={v=>setForm(f=>({...f,type:v}))}
                  options={[{id:'passenger',label:'🧑‍✈️ '+t('schedule.iAmPassenger')},{id:'driver',label:'🚗 '+t('schedule.iAmDriver')}]}/>
              </div>
              <LocationField label={t('form.from')} point={form.from} accent={T.teal}
                placeholder={t('form.addrPlaceholder')}
                onSelect={p=>setForm(f=>({...f,from:p}))}
                onPick={()=>openPick('from','add',form.from)}/>
              <LocationField label={t('form.to')} point={form.to} accent={T.red}
                placeholder={t('form.addrPlaceholder')}
                onSelect={p=>setForm(f=>({...f,to:p}))}
                onPick={()=>openPick('to','add',form.to)}/>
              <WhenField date={form.date} onDate={v=>setForm(f=>({...f,date:v}))}
                tStart={form.tStart} tEnd={form.tEnd}
                onTime={(s,e)=>setForm(f=>({...f,tStart:s,tEnd:e}))}/>
              {form.type==='driver' && (
                <SeatsField value={form.seats} onChange={v=>setForm(f=>({...f,seats:v}))}/>
              )}
              <NotesField value={form.note} onChange={v=>setForm(f=>({...f,note:v}))}/>
              <PrimaryButton enabled={addValid} onClick={submitTrip}>{t('schedule.submit')}</PrimaryButton>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── SAVED PLACES STORE ────────────────────────────────────────
const SAVED_KEY = 'ontheway_saved_v1';
const savedStore = {
  list: () => { try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]'); } catch { return []; } },
  has: (id) => savedStore.list().some(p => p.id === id),
  toggle: (place) => {
    const cur = savedStore.list();
    const exists = cur.find(p => p.id === place.id);
    const next = exists ? cur.filter(p => p.id !== place.id)
      : [{ ...place, savedAt: Date.now() }, ...cur];
    localStorage.setItem(SAVED_KEY, JSON.stringify(next));
    window.dispatchEvent(new Event('ontheway:saved'));
  },
  clear: () => {
    localStorage.setItem(SAVED_KEY, '[]');
    window.dispatchEvent(new Event('ontheway:saved'));
  },
};
function useSaved() {
  const [list, setList] = useState(() => savedStore.list());
  useEffect(() => {
    const h = () => setList(savedStore.list());
    window.addEventListener('ontheway:saved', h);
    return () => window.removeEventListener('ontheway:saved', h);
  }, []);
  return list;
}

// ── O'QILMAGAN XABARLAR STORE ─────────────────────────────────
// { [walker/contact id]: son } — yangi xabar kelganda oshadi, chat ochilganda 0 bo'ladi.
const UNREAD_KEY = 'ontheway_unread_v1';
const unreadStore = {
  map: () => { try { return JSON.parse(localStorage.getItem(UNREAD_KEY) || '{}'); } catch { return {}; } },
  get: (id) => unreadStore.map()[id] || 0,
  total: () => Object.values(unreadStore.map()).reduce((a, b) => a + b, 0),
  add: (id, n = 1) => {
    const m = unreadStore.map();
    m[id] = (m[id] || 0) + n;
    localStorage.setItem(UNREAD_KEY, JSON.stringify(m));
    window.dispatchEvent(new Event('ontheway:unread'));
  },
  clear: (id) => {
    const m = unreadStore.map();
    if (m[id]) { delete m[id]; localStorage.setItem(UNREAD_KEY, JSON.stringify(m)); window.dispatchEvent(new Event('ontheway:unread')); }
  },
};
function useUnread() {
  const [map, setMap] = useState(() => unreadStore.map());
  useEffect(() => {
    const h = () => setMap(unreadStore.map());
    window.addEventListener('ontheway:unread', h);
    return () => window.removeEventListener('ontheway:unread', h);
  }, []);
  return map;
}

// ── WALKER SOZLAMALARI (N) STORE ─────────────────────────────
const SIM_KEY = 'ontheway_n';
const simStore = {
  get: () => {
    const v = parseInt(localStorage.getItem(SIM_KEY) || '5', 10);
    return isNaN(v) ? 5 : Math.min(10, Math.max(1, v));
  },
  set: (n) => {
    n = Math.min(10, Math.max(1, n | 0));
    localStorage.setItem(SIM_KEY, String(n));
    window.dispatchEvent(new Event('ontheway:simcount'));
  },
};
function useSimCount() {
  const [n, setN] = useState(() => simStore.get());
  useEffect(() => {
    const h = () => setN(simStore.get());
    window.addEventListener('ontheway:simcount', h);
    return () => window.removeEventListener('ontheway:simcount', h);
  }, []);
  return [n, simStore.set];
}

        </div>
        {msgs.map(m => {
          const me = m.from === 'me';
          return (
            <div key={m.id} style={{display:'flex',justifyContent:me?'flex-end':'flex-start',
              animation:'fadeUp .25s ease both'}}>
              <div style={{maxWidth:'78%',padding:'8px 12px',
                borderRadius: me ? '16px 16px 4px 16px' : '16px 16px 16px 4px',

                border: me ? 'none' : `1px solid ${T.border}`,

                <div style={{fontSize:13,lineHeight:1.4}}>{m.text}</div>

                  textAlign:'right',color: me ? 'white' : T.muted}}>{fmtT(m.at)}</div>

            animation:'fadeUp .2s ease both'}}>

                  animation:`dotBounce .9s ${i*.15}s ease-in-out infinite`}}/>

        WebkitMaskImage:'linear-gradient(to right,transparent 0,#000 14px,#000 calc(100% - 14px),transparent 100%)',
        maskImage:'linear-gradient(to right,transparent 0,#000 14px,#000 calc(100% - 14px),transparent 100%)'}}>

          <button key={i} onClick={()=>send(t(k))}
            style={{flexShrink:0,padding:'6px 12px',borderRadius:16,
              border:`1px solid ${T.border}`,background:T.surface2,
              color:T.text,fontSize:11,cursor:'pointer',
              whiteSpace:'nowrap',fontFamily:'DM Sans,sans-serif'}}>
            {t(k)}

      </div>

      {/* Input */}
      <div style={{padding:'8px 14px 28px',display:'flex',gap:8,alignItems:'flex-end',
        borderTop:`1px solid ${T.border}`,background:T.glassSolid,flexShrink:0}}>
        <button title={t('chat.attachTip')} style={{width:40,height:40,borderRadius:12,
          border:`1px solid ${T.border}`,background:T.surface2,color:T.muted,
          cursor:'pointer',fontSize:16,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>📎</button>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey){e.preventDefault();send(input);} }}
          placeholder={t('chat.typeMessage')} rows={1}
          style={{flex:1,padding:'10px 14px',borderRadius:18,resize:'none',
            background:T.surface2,border:`1px solid ${T.border}`,
            color:T.text,fontSize:13,outline:'none',fontFamily:'DM Sans,sans-serif',
            maxHeight:80,minHeight:40,lineHeight:1.4}}/>
        <button onClick={()=>send(input)} disabled={!input.trim()}
          style={{width:40,height:40,borderRadius:12,border:'none',
            background: input.trim() ? `linear-gradient(135deg,${T.teal},#0e9e97)` : T.surface2,
            color: input.trim() ? 'white' : T.muted,
            cursor: input.trim() ? 'pointer' : 'not-allowed',
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
            boxShadow: input.trim() ? `0 3px 12px ${T.tealGlow}` : 'none',
            transition:'all .15s ease',padding:0}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8l12-5-5 12-2-5-5-2Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────
function Dashboard() {
  const days = ['Du','Se','Cho','Pa','Ju','Sha','Yak'];
  const weekly = [4.2, 8.1, 6.5, 12.4, 7.2, 5.8, 9.6];
  const max = Math.max(...weekly);
  const totalWeek = weekly.reduce((s,v)=>s+v,0).toFixed(1);

  const destinations = [
    { label:'Yunusabad metro', count:8, km:32.5 },
    { label:'Amir Temur xiyoboni', count:5, km:21.2 },
    { label:'Toshkent TDTU', count:4, km:18.8 },
    { label:'Hamza bozori', count:3, km:14.1 },
  ];
  const maxCount = destinations[0].count;

  const driverTrips = HISTORY_DATA.filter(h=>h.role==='driver').length;
  const passTrips = HISTORY_DATA.filter(h=>h.role==='passenger').length;
  const totalTrips = driverTrips + passTrips || 1;
  const driverPct = Math.round(driverTrips/totalTrips*100);

  const co2Saved = (parseFloat(totalWeek) * 0.21).toFixed(1);
  const moneySaved = Math.round(parseFloat(totalWeek) * 1500);

  const todayIdx = (new Date().getDay()+6)%7; // Monday-first

  return (
    <div style={{padding:'14px 16px 24px',display:'flex',flexDirection:'column',gap:14}}>

      <div style={{background:`linear-gradient(135deg,${T.teal}22,${T.teal}08)`,
        borderRadius:18,padding:'16px 18px',
        border:`1px solid ${T.teal}30`,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,width:140,height:140,borderRadius:70,
          background:`radial-gradient(circle,${T.teal}25 0%,transparent 70%)`,pointerEvents:'none'}}/>
        <div style={{fontSize:11,color:T.teal,fontWeight:600,
          textTransform:'uppercase',letterSpacing:.6,marginBottom:4}}>{t('dashboard.thisWeek')}</div>
        <div style={{display:'flex',alignItems:'baseline',gap:8,position:'relative'}}>
          <div style={{fontSize:32,fontWeight:700,color:T.text,letterSpacing:-1,lineHeight:1}}>{totalWeek}</div>
          <div style={{fontSize:13,color:T.muted}}>{t('dashboard.tripsCount',{n:weekly.filter(v=>v>0).length})}</div>
        </div>
        <div style={{display:'flex',gap:14,marginTop:12,position:'relative'}}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:T.green}}>−{co2Saved} kg</div>
            <div style={{fontSize:10,color:T.muted}}>{t('dashboard.co2')}</div>
          </div>
          <div style={{width:1,background:T.border}}/>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:T.amber}}>{moneySaved.toLocaleString()} {t('dashboard.som')}</div>
            <div style={{fontSize:10,color:T.muted}}>{t('dashboard.moneySaved')}</div>
          </div>
        </div>
      </div>

      {/* Weekly chart */}
      <div style={{background:T.surface2,borderRadius:16,padding:'14px',border:`1px solid ${T.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:T.text}}>{t('dashboard.weeklyActivity')}</div>
          <div style={{fontSize:10,color:T.muted}}>{t('dashboard.kmPerDay')}</div>
        </div>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',
          gap:5,height:96,paddingTop:14}}>
          {weekly.map((v,i) => {
            const h = (v/max)*100;
            const isToday = i === todayIdx;
            return (
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,height:'100%'}}>
                <div style={{flex:1,display:'flex',alignItems:'flex-end',width:'100%',position:'relative'}}>
                  <div style={{width:'100%',height:`${h}%`,
                    background: isToday
                      ? `linear-gradient(to top,${T.teal},#0e9e97)`
                      : `linear-gradient(to top,${T.teal}66,${T.teal}22)`,
                    borderRadius:'5px 5px 2px 2px',
                    boxShadow: isToday ? `0 0 12px ${T.tealGlow}` : 'none',
                    animation:`fadeUp .5s ${i*.07}s ease both`,

                      <div style={{position:'absolute',top:-18,left:'50%',transform:'translateX(-50%)',

      {/* Top destinations */}
      <div style={{background:T.surface2,borderRadius:16,padding:'14px',border:`1px solid ${T.border}`}}>
        <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:12}}>
          {t('dashboard.topDest')}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {destinations.map((d,i) => (
            <div key={d.label} style={{animation:`fadeUp .3s ${i*.06}s ease both`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
                  <div style={{width:20,height:20,borderRadius:6,
                    background: i===0?T.tealDim:T.bg,
                    color: i===0?T.teal:T.muted,fontSize:10,fontWeight:700,
                    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {i+1}
